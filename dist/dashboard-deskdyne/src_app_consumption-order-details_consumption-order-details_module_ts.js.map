<h2 mat-dialog-title>{{ data.title }}</h2>

<form [formGroup]="form">  <!-- ✅ add form wrapper -->
  <mat-dialog-content>
    <mat-form-field appearance="outline" class="w-100">
      <mat-label>Reason</mat-label>
      <textarea
        matInput
        cdkTextareaAutosize
        formControlName="reason"       
        [placeholder]="data.placeholder || 'Add reason...'"
        rows="3">
      </textarea>
      <mat-hint align="start" class="muted">This reason will be saved with the cancellation.</mat-hint>
      <mat-error *ngIf="form.get('reason')?.hasError('required')">Reason is required</mat-error>
      <mat-error *ngIf="form.get('reason')?.hasError('minlength')">At least 3 characters</mat-error>
      <mat-error *ngIf="form.get('reason')?.hasError('maxlength')">Max 500 characters</mat-error>
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-stroked-button type="button" (click)="close()">Close</button>
    <button color="warn" mat-flat-button type="submit" (click)="submit()" [disabled]="form.invalid">
      Submit Reason
    </button>
  </mat-dialog-actions>
</form>
