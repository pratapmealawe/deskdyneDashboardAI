<form class="container-fluid pt-4" [formGroup]="foodItemForm" (ngSubmit)="onSubmit()" novalidate>
  <div class="row">
    <!-- IMAGE UPLOAD -->
    <div class="col-12 col-md-3 col-lg-2 d-flex flex-column align-items-start">
      <input #fileInput type="file" class="uploadInput" accept="image/*" capture="camera"
        (change)="handleFileInput($event)" />
      <img (click)="fileInput.click()" [src]="imageUrl ? imageUrl : 'assets/images/dummyUpload.png'"
        class="uploadedImage mb-2" />
      <button class="btn-import" type="button" mat-stroked-button color="primary" (click)="fileInput.click()">
        <mat-icon class="me-1">file_upload</mat-icon>
        Upload
      </button>
    </div>

    <!-- NAME -->
    <div class="col-12 col-md-4 col-lg-3">
      <mat-form-field appearance="outline" class="w-100">
        <mat-label>Item Name</mat-label>
        <input matInput id="itemName" formControlName="itemName" placeholder="Enter Item Name" />
        <mat-error *ngIf="f['itemName'].touched && f['itemName'].invalid">
          <span *ngIf="f['itemName'].errors?.['required']">
            Item name is required.
          </span>
          <span *ngIf="f['itemName'].errors?.['minlength']">
            Minimum 2 characters required.
          </span>
          <span *ngIf="f['itemName'].errors?.['maxlength']">
            Maximum 80 characters allowed.
          </span>
        </mat-error>
      </mat-form-field>
    </div>
  </div>

  <div class="row">
    <!-- ITEM TYPE -->
    <div class="col-sm-12 col-md-6 col-lg-2">
      <label class="labelText d-block mb-1">Item Type</label>
      <div>
        <button type="button" mat-raised-button class="me-2 mb-1"
          [color]="f['itemType'].value === 'Veg' ? 'primary' : undefined"
          [ngClass]="{ 'mat-button-toggle-checked': f['itemType'].value === 'Veg' }" (click)="setItemType('Veg')">
          Veg
        </button>

        <button type="button" mat-raised-button class="me-2 mb-1"
          [color]="f['itemType'].value === 'NonVeg' ? 'primary' : undefined" [ngClass]="{
            'mat-button-toggle-checked': f['itemType'].value === 'NonVeg'
          }" (click)="setItemType('NonVeg')">
          NonVeg
        </button>

        <button type="button" mat-raised-button class="me-2 mb-1"
          [color]="f['itemType'].value === 'Jain' ? 'primary' : undefined"
          [ngClass]="{ 'mat-button-toggle-checked': f['itemType'].value === 'Jain' }" (click)="setItemType('Jain')">
          Jain
        </button>
      </div>
    </div>

    <!-- SERVING TYPE -->
    <div class="col-sm-12 col-md-6 col-lg-3 mt-1">
      <label class="labelText d-block mb-1">Serving Type</label>
      <div>
        <button type="button" mat-raised-button class="me-2 mb-1"
          [color]="f['itemServingType'].value === 'perPerson' ? 'primary' : undefined"
          (click)="setServingType('perPerson')">
          perPerson
        </button>
        <button type="button" mat-raised-button class="me-2 mb-1"
          [color]="f['itemServingType'].value === 'perUnit' ? 'primary' : undefined"
          (click)="setServingType('perUnit')">
          perUnit
        </button>
        <button type="button" mat-raised-button class="me-2 mb-1"
          [color]="f['itemServingType'].value === 'perQuantity' ? 'primary' : undefined"
          (click)="setServingType('perQuantity')">
          perQuantity
        </button>
      </div>
    </div>

    <!-- SLABS -->
    <div class="col-sm-12 col-md-6 col-lg-5 mt-1">
      <div class="row">
        <div class="col-6 col-md-6 col-lg-3">
          <mat-form-field appearance="outline" class="w-100">
            <mat-label>Slab 1</mat-label>
            <input matInput type="number" id="slab1Price" formControlName="slab1Price" placeholder="Slab 1 price" />
            <mat-error *ngIf="f['slab1Price'].touched && f['slab1Price'].invalid">
              <span *ngIf="f['slab1Price'].errors?.['required']">
                Slab 1 price is required.
              </span>
              <span *ngIf="f['slab1Price'].errors?.['min']">
                Must be greater than 0.
              </span>
            </mat-error>
          </mat-form-field>
        </div>

        <div class="col-6 col-md-6 col-lg-3">
          <mat-form-field appearance="outline" class="w-100">
            <mat-label>Slab 2</mat-label>
            <input matInput type="number" id="slab2Price" formControlName="slab2Price" placeholder="Slab 2 price" />
            <mat-error *ngIf="f['slab2Price'].touched && f['slab2Price'].invalid">
              <span *ngIf="f['slab2Price'].errors?.['min']">
                Must be ≥ 0.
              </span>
            </mat-error>
          </mat-form-field>
        </div>

        <div class="col-12 col-md-6 col-lg-3">
          <mat-form-field appearance="outline" class="w-100">
            <mat-label>Slab 3</mat-label>
            <input matInput type="number" id="slab3Price" formControlName="slab3Price" placeholder="Slab 3 price" />
            <mat-error *ngIf="f['slab3Price'].touched && f['slab3Price'].invalid">
              <span *ngIf="f['slab3Price'].errors?.['min']">
                Must be ≥ 0.
              </span>
            </mat-error>
          </mat-form-field>
        </div>

        <div class="col-12 col-md-6 col-lg-3">
          <mat-form-field appearance="outline" class="w-100">
            <mat-label>Slab 4</mat-label>
            <input matInput type="number" id="slab4Price" formControlName="slab4Price" placeholder="Slab 4 price" />
            <mat-error *ngIf="f['slab4Price'].touched && f['slab4Price'].invalid">
              <span *ngIf="f['slab4Price'].errors?.['min']">
                Must be ≥ 0.
              </span>
            </mat-error>
          </mat-form-field>
        </div>
      </div>
    </div>
  </div>

  <!-- DESCRIPTION -->
  <div class="row mt-2">
    <div class="col-12">
      <mat-form-field appearance="outline" class="w-100">
        <mat-label>Description</mat-label>
        <textarea matInput id="itemdescription" rows="3" formControlName="itemDescription"
          placeholder="Item description"></textarea>
        <mat-error *ngIf="f['itemDescription'].touched && f['itemDescription'].invalid">
          <span *ngIf="f['itemDescription'].errors?.['required']">
            Description is required.
          </span>
          <span *ngIf="f['itemDescription'].errors?.['maxlength']">
            Maximum 300 characters allowed.
          </span>
        </mat-error>
      </mat-form-field>
    </div>
  </div>

  <!-- BUTTONS -->
  <div class="mt-2 d-flex gap-2">
    <div *ngIf="(editType === 'new' && true) || btnPolicy?.addFoodItem">
      <button class="btn-add" type="submit" mat-flat-button color="primary" [disabled]="foodItemForm.invalid">
        <mat-icon>check_circle</mat-icon> Submit
      </button>
    </div>

    <div *ngIf="(editType === 'edit' && true) || btnPolicy?.editFoodItem">
      <button class="btn-update" type="submit" mat-flat-button color="primary" [disabled]="foodItemForm.invalid">
        <mat-icon>update</mat-icon> Update
      </button>
    </div>

    <div>
      <button class="btn-delete" type="button" mat-stroked-button color="warn" (click)="goToPreviousPage('cancel')">
        <mat-icon>cancel</mat-icon> Cancel
      </button>
    </div>
  </div>
</form>
