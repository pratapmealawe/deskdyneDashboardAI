<div class="vendor-header">
    <div>
        <h4 class="m-0 fw-semibold">Image Group Configs</h4>
    </div>
    <div class="header-actions">
        <button mat-raised-button color="primary" (click)="openAddConfigModal()">
            <mat-icon>add_circle</mat-icon> Add Config
        </button>
    </div>
</div>

<div class="container-fluid pb-4">

    <!-- No Data State -->
    <div *ngIf="!imageGroupConfigs.length" class="center">
        No image group configs found.
    </div>

    <!-- Card List -->
    <div *ngIf="imageGroupConfigs.length">
        <div *ngFor="let config of imageGroupConfigs; let i = index" class="cardDesign">
            <div class="container-fluid">
                <div class="row align-items-center">

                    <!-- Index -->
                    <div class="col-md-1 mb-2 mb-md-0 d-none d-md-block">
                        <div class="labelText">#</div>
                        <div class="labelData">{{ i + 1 + (currentPage - 1) * pageSize }}</div>
                    </div>

                    <!-- Name -->
                    <div class="col-md-4 mb-2 mb-md-0">
                        <div class="labelText">Name</div>
                        <div class="labelData">{{ config.name }}</div>
                    </div>

                    <!-- Created At -->
                    <div class="col-md-3 mb-2 mb-md-0">
                        <div class="labelText">Created</div>
                        <div class="labelData">{{ config.createdAt | date: 'dd-MM-yyyy' }}</div>
                    </div>

                    <!-- Updated At -->
                    <div class="col-md-3 mb-2 mb-md-0">
                        <div class="labelText">Updated</div>
                        <div class="labelData">{{ config.updatedAt | date: 'dd-MM-yyyy' }}</div>
                    </div>

                    <!-- Actions -->
                    <div class="col-md-1 d-flex align-items-center justify-content-end p-0 gap-2">
                        <button mat-icon-button color="primary" (click)="editConfig(config)" matTooltip="Edit">
                            <mat-icon>edit</mat-icon>
                        </button>
                        <button mat-icon-button color="warn" (click)="confirmDelete(config)" matTooltip="Delete">
                            <mat-icon>delete</mat-icon>
                        </button>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <!-- Paginator -->
    <nav *ngIf="totalPages > 1" class="mt-4 d-flex justify-content-end">
        <ul class="pagination">
            <li class="page-item" [class.disabled]="currentPage === 1">
                <a class="page-link" href="javascript:void(0)" (click)="changePage(currentPage - 1)">Previous</a>
            </li>
            <li class="page-item" *ngFor="let page of pageSizeOptions" [class.active]="currentPage === page"
                [class.d-none]="page > totalPages">
                <!-- Simple logic for demo, ideally should calculate ranges if many pages -->
                <a class="page-link" href="javascript:void(0)" (click)="changePage(page)">{{ page }}</a>
            </li>
            <li class="page-item" [class.disabled]="currentPage === totalPages">
                <a class="page-link" href="javascript:void(0)" (click)="changePage(currentPage + 1)">Next</a>
            </li>
        </ul>
    </nav>

</div>
