<div class="d-flex justify-content-between align-items-center p-3 border-bottom">
    <h2 class="m-0 fs-5 fw-bold">Bulk Add Wallet Balance</h2>
    <button mat-icon-button (click)="close()">
        <mat-icon>close</mat-icon>
    </button>
</div>

<div class="p-4 dialog-content">
    <div class="mb-4">
        <p class="text-muted mb-2">Step 1: Download the template file.</p>
        <button mat-stroked-button color="primary" (click)="downloadTemplate()">
            <mat-icon class="me-2">file_download</mat-icon>
            Download Template
        </button>
    </div>

    <div class="mb-4">
        <p class="text-muted mb-2">Step 2: Upload the filled Excel file.</p>

        <div class="file-upload-container">
            <input type="file" (change)="onFileChange($event)" accept=".xlsx, .xls" class="file-input" #fileInput>
            <div class="file-drop-area" (click)="fileInput.click()">
                <mat-icon class="upload-icon">cloud_upload</mat-icon>
                <div *ngIf="!fileName" class="mt-2">Click to browse or drag file here</div>
                <div *ngIf="fileName" class="mt-2 fw-bold text-primary">{{ fileName }}</div>
            </div>
        </div>

        <div *ngIf="errorMessage" class="text-danger mt-2 small">
            <mat-icon class="align-middle" style="font-size: 16px; width: 16px; height: 16px;">error</mat-icon>
            {{ errorMessage }}
        </div>

        <div *ngIf="isValidFile && parsedData.length > 0" class="text-success mt-2 small">
            <mat-icon class="align-middle" style="font-size: 16px; width: 16px; height: 16px;">check_circle</mat-icon>
            {{ parsedData.length }} records found ready for upload.
        </div>
    </div>

    <div class="d-flex justify-content-end gap-2 mt-4">
        <button mat-button (click)="close()">Cancel</button>
        <button mat-flat-button color="primary" [disabled]="!isValidFile || isUploading" (click)="upload()">
            <span *ngIf="!isUploading">Upload & Process</span>
            <span *ngIf="isUploading">Processing...</span>
        </button>
    </div>
</div>
