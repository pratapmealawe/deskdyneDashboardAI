<h2 mat-dialog-title>
    {{ actionType === 'add' ? 'Add Money to Wallet' : 'Deduct Money from Wallet' }}
</h2>

<mat-dialog-content>
    <form [formGroup]="form" class="d-flex flex-column gap-3 pt-2">
        <div class="alert alert-info py-2 mb-0">
            <small><strong>Customer:</strong> {{ customerName }}</small>
        </div>

        <!-- Amount -->
        <mat-form-field appearance="outline" class="w-100">
            <mat-label>Amount</mat-label>
            <input matInput type="number" formControlName="amount" placeholder="Enter amount">
            <mat-error *ngIf="form.get('amount')?.hasError('required')">Amount is required</mat-error>
            <mat-error *ngIf="form.get('amount')?.hasError('min')">Amount must be greater than 0</mat-error>
        </mat-form-field>

        <!-- Wallet Type -->
        <mat-form-field appearance="outline" class="w-100">
            <mat-label>Wallet Type</mat-label>
            <mat-select formControlName="walletType">
                <mat-option *ngFor="let type of walletTypes" [value]="type.value">
                    {{ type.viewValue }}
                </mat-option>
            </mat-select>
            <mat-error *ngIf="form.get('walletType')?.hasError('required')">Wallet Type is required</mat-error>
        </mat-form-field>

        <!-- Remark -->
        <mat-form-field appearance="outline" class="w-100">
            <mat-label>Remark</mat-label>
            <textarea matInput formControlName="remark" rows="3" placeholder="Enter remarks"></textarea>
            <mat-error *ngIf="form.get('remark')?.hasError('required')">Remark is required</mat-error>
        </mat-form-field>
    </form>
</mat-dialog-content>

<mat-dialog-actions align="end" class="pb-3 pe-3">
    <button mat-button (click)="close()">Cancel</button>
    <button mat-flat-button [color]="actionType === 'add' ? 'primary' : 'warn'" (click)="submit()">
        {{ actionType === 'add' ? 'Add Money' : 'Deduct Money' }}
    </button>
</mat-dialog-actions>
