<div class="d-flex justify-content-between align-items-center p-3 border-bottom">
    <h2 class="m-0 fs-5 fw-bold">Wallet Transaction History</h2>
    <button mat-icon-button (click)="close()">
        <mat-icon>close</mat-icon>
    </button>
</div>

<mat-dialog-content class="p-0">
    <div class="p-3">
        <app-wallet-transaction-history [vendorFirmInfo]="data.vendorFirmInfo"
            [isDialog]="true"></app-wallet-transaction-history>
    </div>
</mat-dialog-content>
