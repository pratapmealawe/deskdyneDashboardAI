<div class="login-wrapper">
  <div class="row g-0 min-vh-100">

    <!-- LEFT IMAGE PANEL (HIDDEN ON SMALL SCREENS) -->
    <div class="col-12 col-md-8 px-0 d-none d-md-flex ">
      <div class="login-img h-100 position-relative">
        <div class="logo-desktop">
          <img src="assets/images/logos/DeskDyne-Logo-01.png" alt="DeskDyne Logo" />
        </div>

        <img src="assets/login/LoginImage.png" alt="DeskDyne login banner" class="login-hero-img" />
      </div>
    </div>

    <!-- RIGHT FORM PANEL -->
    <div class="col-12 col-md-4 forms d-flex align-items-center justify-content-center">
      <div class="form-container">

        <!-- MOBILE LOGO -->
        <div class="logo-mobile d-md-none text-center mb-3">
          <img src="assets/images/logos/DeskDyne-Logo-01.png" alt="DeskDyne Logo" />
        </div>

        <!-- LOGIN FORM -->
        <div class="login-form" *ngIf="!showOTP">
          <div class="login-title">
            Welcome to <span class="fw-bold">DESKDYNE!</span>
          </div>
          <p class="text-muted mb-3">Please login to your account.</p>

          <form (ngSubmit)="login()" novalidate>
            <div class="row gx-0">
              <div class="col-12 mb-3">
                <mat-form-field appearance="outline" class="w-100">
                  <mat-label>Admin/User ID</mat-label>
                  <input matInput type="text" name="adminID" [(ngModel)]="adminId" placeholder="Enter your ID here"
                    autocomplete="off" />
                </mat-form-field>
              </div>

              <div class="col-12">
                <button type="submit" class="btn login-btn" [disabled]="!adminId || isLoggingIn">
                  <span *ngIf="!isLoggingIn">Login</span>
                  <span *ngIf="isLoggingIn">Logging in...</span>
                </button>
              </div>
            </div>
          </form>
        </div>

        <!-- OTP FORM -->
        <div class="otp-form" *ngIf="showOTP">
          <div class="otp-container">
            <button type="button" class="btn btn-sm btn-outline-secondary back-btn mb-2" (click)="backToLogin()">
              ← Back to Login
            </button>

            <h4 class="otp-title mb-2">Enter OTP</h4>

            <p class="otp-subtitle text-muted mb-3">
              Check your registered mobile for a 6-digit code.
            </p>

            <div class="otp-inputs mb-3 justify-content-center d-flex">
              <ng-otp-input (onInputChange)="onOtpChange($event)"
                [config]="{length:6, allowNumbersOnly:true}"></ng-otp-input>
            </div>

            <button class="btn verify-btn mb-2" [disabled]="!isOTPComplete() || isVerifying" (click)="verifyOTP()">
              <span *ngIf="!isVerifying">Verify</span>
              <span *ngIf="isVerifying">Verifying...</span>
            </button>

            <div class="resend-text" [class.active]="timer === 0" (click)="timer === 0 && resendOTP()">
              {{ timer === 0 ? 'Resend OTP' : ('Resend in ' + timer + 's') }}
            </div>
          </div>
        </div>

      </div>
    </div>

  </div>
</div>
