<div class="pdf-upload-container">
    <!-- Upload Zone -->
    <div class="upload-zone" [class.drag-active]="isDragging" (dragover)="onDragOver($event)" (drop)="onDrop($event)"
        (dragleave)="onDragLeave($event)">
        <div class="upload-content" *ngIf="!selectedFile">
            <div class="icon-circle">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
            </div>
            <p class="upload-text">Drag & drop PDF here</p>
            <p class="upload-subtext">or click to browse</p>
            <input [id]="inputId" type="file" class="file-input" (change)="onFileSelected($event)"
                accept="application/pdf,.jpg,.jpeg,.png" />
            <label [for]="inputId" class="browse-btn">Browse Files</label>
        </div>

        <div class="file-info" *ngIf="selectedFile">
            <div class="file-details">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="file-icon">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13"></line>
                    <line x1="16" y1="17" x2="8" y2="17"></line>
                    <polyline points="10 9 9 9 8 9"></polyline>
                </svg>
                <div class="file-meta">
                    <span class="file-name">{{ selectedFile.name }}</span>
                    <span class="file-size">{{ (selectedFile.size / 1024).toFixed(1) }} KB</span>
                </div>
                <button class="remove-btn" (click)="cancelSelection()" title="Remove file">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>

            <div class="action-buttons">
                <button class="upload-action-btn" (click)="uploadFile()">
                    Upload File
                </button>
            </div>
        </div>
    </div>

    <!-- Preview (Optional, if needed side-by-side or below) -->
    <div class="preview-zone" *ngIf="selectedFileURL && selectedFile">
        <div class="preview-header">Preview</div>
        <iframe [src]="selectedFileURL" type="application/pdf"></iframe>
    </div>
</div>
