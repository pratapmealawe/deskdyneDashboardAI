<div class="header d-flex justify-content-between align-items-center mb-3">
    <h2 mat-dialog-title class="m-0">{{ mode === 'create' ? 'Add New' : 'Edit' }} Audit Report</h2>
    <button mat-icon-button (click)="close()">
        <mat-icon>close</mat-icon>
    </button>
</div>

<mat-dialog-content>
    <form [formGroup]="form" class="d-flex flex-column gap-3">
        <mat-form-field appearance="outline" class="w-100">
            <mat-label>Organization</mat-label>
            <mat-select formControlName="orgId" (selectionChange)="onOrgChange($event.value)">
                <mat-option *ngFor="let org of orgList" [value]="org._id">
                    {{ org.organization_name }}
                </mat-option>
            </mat-select>
            <mat-error *ngIf="form.get('orgId')?.hasError('required')">Organization is required</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="w-100">
            <mat-label>Cafeteria</mat-label>
            <mat-select formControlName="cafeteriaId">
                <mat-option *ngFor="let cafe of cafeList" [value]="cafe.cafeteria_id">
                    {{ cafe.cafeteria_name }}
                </mat-option>
            </mat-select>
            <mat-error *ngIf="form.get('cafeteriaId')?.hasError('required')">Cafeteria is required</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="w-100">
            <mat-label>Uploaded Date</mat-label>
            <input matInput [matDatepicker]="picker" formControlName="uploadedDate">
            <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
            <mat-datepicker #picker></mat-datepicker>
            <mat-error *ngIf="form.get('uploadedDate')?.hasError('required')">Date is required</mat-error>
        </mat-form-field>

        <div class="file-upload-container d-flex align-items-center gap-2">
            <button mat-stroked-button color="primary" (click)="fileInput.click()" [disabled]="loading">
                <mat-icon>upload_file</mat-icon>
                {{ selectedFileName || 'Choose PDF File' }}
            </button>
            <input #fileInput type="file" accept="application/pdf" (change)="onFileSelected($event)"
                style="display: none;">
            <span *ngIf="selectedFileName" class="text-muted small">{{ selectedFileName }}</span>
        </div>
        <div *ngIf="mode === 'create' && !selectedFileName" class="text-danger small">
            File is required.
        </div>
    </form>
</mat-dialog-content>

<mat-dialog-actions align="end" class="mt-3">
    <button mat-button (click)="close()" [disabled]="loading">Cancel</button>
    <button class="btn-add" mat-raised-button color="primary" (click)="submit()" [disabled]="form.invalid || loading">
        <mat-icon>add</mat-icon> Create
    </button>
</mat-dialog-actions>
