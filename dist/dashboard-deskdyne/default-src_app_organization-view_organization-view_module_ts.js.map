<h2 mat-dialog-title>
    {{ data?.category ? 'Edit Package Category' : 'Add Package Category' }}
</h2>

<mat-dialog-content [formGroup]="categoryForm" class="dialog-form">
    <div class="row mt-3">
        <mat-form-field appearance="outline" class="w-100">
            <mat-label>Category Name</mat-label>
            <mat-select formControlName="categoryName">
                <mat-option *ngFor="let cat of packageCategoryList" [value]="cat">
                    {{ cat }}
                </mat-option>
            </mat-select>
        </mat-form-field>
        <mat-form-field appearance="outline" class="w-100">
            <mat-label>Category Display Name</mat-label>
            <input matInput formControlName="categoryDisplayName">
        </mat-form-field>
        <mat-form-field appearance="outline" class="w-100">
            <mat-label>Image Config Name (MealAwe)</mat-label>
            <input matInput formControlName="imageConfigNameMealawe">
        </mat-form-field>
        <div class="mt-3">
            <p><b>Category Image</b></p>
            <input type="file" (change)="onCategoryImgSelect($event)" accept="image/*">
            <div *ngIf="categoryForm.value.categoryImg" class="preview-img mt-2">
                <img [src]="categoryForm.value.categoryImg" width="120" />
            </div>
        </div>
        <div class="mt-3">
            <p><b>Category Banners</b> (Drag to reorder)</p>
            <input type="file" multiple (change)="onBannerSelect($event)" accept="image/*">

            <div cdkDropList (cdkDropListDropped)="dropBanner($event)" class="banner-preview mt-2">
                <div *ngFor="let b of banners; let i = index" cdkDrag class="banner-item">
                    <img [src]="b.preview" width="120" />
                    <button mat-icon-button color="warn" class="remove-btn" (click)="removeBanner(i)">
                        <mat-icon>close</mat-icon>
                    </button>
                </div>
            </div>
        </div>
    </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
    <button mat-raised-button color="primary" (click)="saveCategory()" [disabled]="categoryForm.invalid">
        Save
    </button>
    <button mat-stroked-button color="warn" (click)="closeDialog()">Cancel</button>
</mat-dialog-actions>
