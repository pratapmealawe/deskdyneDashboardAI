<h2 mat-dialog-title class="border-bottom px-3 py-2 m-0">
    <div class="d-flex justify-content-between align-items-center">
        <span class="fw-bold text-dark">
            {{ data.vendorDetails ? 'Edit' : 'Add' }} Vendor
        </span>

        <button mat-icon-button (click)="closeModal()">
            <mat-icon>close</mat-icon>
        </button>
    </div>
</h2>

<mat-dialog-content class="p-3">
    <form [formGroup]="vendorForm">
        <div class="row g-3">
            <div class="col-md-6">
                <mat-form-field appearance="outline" class="w-100">
                    <mat-label>Vendor Firm Name</mat-label>
                    <mat-select formControlName="vendorFirmId" (selectionChange)="onVendorFirmChange($event)">
                        <mat-option *ngFor="let vendorFirm of vendorFirmList"
                            [value]="vendorFirm.vendorFirmDetails.vendorFirmId">
                            {{ vendorFirm.vendorFirmDetails?.vendorFirmName }}
                        </mat-option>
                    </mat-select>
                </mat-form-field>
            </div>

            <div class="col-md-6">
                <label class="fw-medium d-block">Vendor Name</label>
                <mat-radio-group formControlName="vendorId" (change)="onVendorChange($event)"
                    class="d-flex align-items-center gap-4 flex-wrap">
                    <mat-radio-button *ngFor="let vendor of vendorList" [value]="vendor._id">
                        {{ vendor.vendorName }}
                    </mat-radio-button>
                </mat-radio-group>
            </div>

        </div>
    </form>
</mat-dialog-content>

<mat-dialog-actions align="end" class="border-top px-4 py-3 m-0">
    <button mat-stroked-button color="primary" class="me-2" (click)="closeModal()">
        Cancel
    </button>

    <button mat-raised-button color="primary" [disabled]="vendorForm.invalid" (click)="saveChanges()">
        Save Changes
    </button>
</mat-dialog-actions>
