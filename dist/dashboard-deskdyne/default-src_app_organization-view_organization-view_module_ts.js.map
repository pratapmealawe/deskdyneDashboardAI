<div mat-dialog-title>
    <div class="d-flex justify-content-between align-items-center">
        <h5 class="mb-0 fw-bold text-dark">
            {{data.mealConfigData ? 'Edit' : 'Add'}} Weekly Menu
        </h5>
        <button mat-icon-button (click)="closeModal()" class="text-secondary">
            <mat-icon>close</mat-icon>
        </button>
    </div>
</div>

<mat-dialog-content class="mat-typography custom-scrollbar bg-light px-4 py-4">
    <form [formGroup]="menuForm" (ngSubmit)="onSubmit()">
        <div class="card border-0 shadow-sm rounded-4 mb-4 overflow-hidden">
            <div class="card-body p-4 bg-white">
                <h6 class="text-uppercase text-secondary fw-bold small mb-3 tracking-wide">Menu Details</h6>
                <div class="row g-3">
                    <div class="col-md-4">
                        <mat-form-field appearance="outline" class="w-100 bg-white" subscriptSizing="dynamic">
                            <mat-label>Item Name</mat-label>
                            <input matInput formControlName="itemName" placeholder="e.g. Tiffin Service">
                            <mat-error *ngIf="menuForm.get('itemName')?.hasError('required')">Required</mat-error>
                        </mat-form-field>
                    </div>
                    <div class="col-md-4">
                        <mat-form-field appearance="outline" class="w-100 bg-white" subscriptSizing="dynamic">
                            <mat-label>Meal Price (From Customer)</mat-label>
                            <input matInput type="number" formControlName="mealPrice" placeholder="0.00">
                            <mat-error *ngIf="menuForm.get('mealPrice')?.hasError('required')">Required</mat-error>
                            <mat-error *ngIf="menuForm.get('mealPrice')?.hasError('min')">Must be positive</mat-error>
                        </mat-form-field>
                    </div>
                    <div class="col-md-4">
                        <mat-form-field appearance="outline" class="w-100 bg-white" subscriptSizing="dynamic">
                            <mat-label>Pay Amt To Kitchen (By Us)</mat-label>
                            <input matInput type="number" formControlName="payAmtToKitchen" placeholder="0.00">
                            <mat-error
                                *ngIf="menuForm.get('payAmtToKitchen')?.hasError('required')">Required</mat-error>
                            <mat-error *ngIf="menuForm.get('payAmtToKitchen')?.hasError('min')">Must be
                                positive</mat-error>
                        </mat-form-field>
                    </div>
                    <div class="col-md-12 mt-2">
                        <mat-checkbox color="primary" formControlName="isSameDay">Enable Same Day
                            Delivery</mat-checkbox>
                    </div>
                </div>
                <div class="row"
                    *ngIf="menuForm.hasError('priceInvalid') && (menuForm.get('mealPrice')?.touched || menuForm.get('payAmtToKitchen')?.touched)">
                    <div class="col-12">
                        <mat-error class="small">
                            Pay Amount To Kitchen must be less than Meal Price
                        </mat-error>
                    </div>
                </div>
            </div>
        </div>
        <div class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 g-3" formArrayName="days">
            <div class="col" *ngFor="let day of days.controls; let dIndex = index" [formGroupName]="dIndex">
                <div class="day-card h-100" [class.selected]="day.get('notApplicable')?.value">
                    <div class="card-header d-flex align-items-center gap-2">
                        <mat-checkbox color="primary" formControlName="notApplicable" [id]="'check-'+dIndex"
                            class="example-margin">
                        </mat-checkbox>
                        <label [for]="'check-'+dIndex" class="mb-0 fw-bold text-dark cursor-pointer flex-grow-1">
                            {{ day.get('itemDay')?.value }}
                        </label>
                    </div>
                    <div class="card-body d-flex flex-column gap-2"
                        [class.opacity-50]="!day.get('notApplicable')?.value">
                        <mat-form-field appearance="outline" class="w-100 compact-field" subscriptSizing="dynamic">
                            <input matInput formControlName="itemName" placeholder="Item Name"
                                [disabled]="!day.get('notApplicable')?.value">
                            <mat-error *ngIf="day.get('itemName')?.hasError('required')">Required</mat-error>
                        </mat-form-field>
                        <mat-form-field appearance="outline" class="w-100 compact-field" subscriptSizing="dynamic">
                            <input matInput formControlName="itemDescription" placeholder="Description"
                                [disabled]="!day.get('notApplicable')?.value">
                            <mat-error *ngIf="day.get('itemDescription')?.hasError('required')">Required</mat-error>
                        </mat-form-field>
                    </div>
                </div>
            </div>
        </div>
    </form>
</mat-dialog-content>

<div mat-dialog-actions class="border-top py-3 px-4 bg-white d-flex justify-content-end gap-2">
    <button mat-stroked-button (click)="closeModal()" class="px-4">Cancel</button>
    <button mat-flat-button color="primary" (click)="onSubmit()" class="px-4">Save Configuration</button>
</div>
