<div class="container-fluid py-3 dashboardContainer">
  <h3>Dashboard</h3>

  <ng-container *ngIf="orgAdmin.role === 'ORGADMIN' || isOrgSelected">
    <app-main-dashboard [orgAdmin]="orgAdmin"></app-main-dashboard>
  </ng-container>


  <ng-container *ngIf="orgAdmin.role === 'HYPERPURE_ADMIN' || orgAdmin.role === 'HYPERPURE_POC'">
    <app-hyperpure-dashboard [orgAdmin]="orgAdmin"></app-hyperpure-dashboard>
  </ng-container>
</div>
