<div *ngIf="showDialog" class="dialog-wrapper" role="dialog" aria-modal="true" aria-labelledby="session-dialog-title">
    <div class="dialog-content">
        <div class="dialogHeader">
            <div class="header-title" id="session-dialog-title">
                <span>Session Exired</span>
            </div>
        </div>
        <div class="dialogbody">
            <p>Your session has expired. Please login again to continue.</p>
        </div>
        <div class="dialogfooter">
            <button (click)="confirm()">Login Again</button>
        </div>
    </div>
</div>
