<div class="vendor-header">
  <div>
    <h4 class="m-0 fw-semibold">FAQ Management</h4>
  </div>
  <div class="header-actions">
    <button mat-raised-button color="primary" *ngIf="!addnewFAQ && (true || btnPolicy?.addFaq)" (click)="addFAQ()">
      <mat-icon>add</mat-icon> Add FAQ
    </button>
  </div>
</div>

<div class="container-fluid pb-4">

  <!-- Edit Mode Section -->
  <div *ngIf="editMode" class="bgpadding3 mb-4">
    <div class="labelText mb-3" *ngIf="!addnewFAQ">Update FAQ</div>
    <div class="labelText mb-3" *ngIf="addnewFAQ">Add New FAQ</div>

    <div class="row g-3">
      <div class="col-12">
        <label class="labelText mb-2" for="question">Question</label>
        <input type="text" class="form-control" id="question" [(ngModel)]="faqObj.question"
          placeholder="Enter question" />
      </div>

      <div class="col-12">
        <label class="labelText mb-2" for="answer">Answer</label>
        <textarea type="text" class="form-control" id="answer" [(ngModel)]="faqObj.answer" placeholder="Enter answer"
          style="height: auto; min-height: 80px; padding-top: 10px;"></textarea>
      </div>

      <div class="col-12">
        <label class="labelText mb-2">FAQ For</label>
        <div class="d-flex align-items-center gap-3">
          <div class="form-check">
            <input class="form-check-input" type="radio" id="DDVendor" value="DDVendor" [(ngModel)]="faqObj.faqFor"
              name="faqTarget">
            <label class="form-check-label" for="DDVendor">DDVendor</label>
          </div>
          <!-- Add more radio buttons if needed for other targets like 'User' -->
        </div>
      </div>
    </div>

    <div class="mt-4 d-flex gap-2">
      <button *ngIf="addnewFAQ && (true || btnPolicy?.addFaq)" mat-raised-button color="primary"
        (click)="submitnewFAQ(faqObj)">
        Submit
      </button>

      <button *ngIf="!addnewFAQ && (true || btnPolicy?.editFaq)" mat-raised-button color="primary"
        (click)="updateFAQ(faqObj)">
        Update
      </button>

      <button mat-stroked-button color="warn" (click)="cancel()">
        Cancel
      </button>
    </div>
  </div>

  <!-- List Section -->
  <div *ngIf="!editMode">
    <div *ngIf="allFAQs && allFAQs.length === 0" class="center">
      No FAQs Found
    </div>

    <div *ngFor="let faq of allFAQs" class="cardDesign">
      <div class="container-fluid">
        <div class="row align-items-start">

          <!-- Content -->
          <div class="col-md-10">
            <div class="mb-2">
              <span class="labelText me-2">Q:</span>
              <span class="fw-bold">{{ faq.question }}</span>
            </div>
            <div class="mb-2">
              <span class="labelText me-2">A:</span>
              <span class="labelData">{{ faq.answer }}</span>
            </div>
            <div>
              <span class="badge bg-light text-dark border">For: {{ faq.faqFor }}</span>
            </div>
          </div>

          <!-- Actions -->
          <div class="col-md-2 d-flex align-items-center justify-content-end p-0 gap-2">
            <button mat-icon-button color="primary" *ngIf="true || btnPolicy?.editFaq" (click)="editFAQ(faq)"
              matTooltip="Edit">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="warn" *ngIf="true || btnPolicy?.deleteFaq" (click)="showPopup(faq)"
              matTooltip="Delete">
              <mat-icon>delete</mat-icon>
            </button>
          </div>

        </div>
      </div>
    </div>
  </div>

</div>
