<div class="container-fluid">
  <h3 class="mb-0 pb-4">Reviews</h3>
  <div *ngIf="isAdmin">
    <app-common-outlet-cafe-select [config]="headerConfigAdmin"
      (submitted)="filterSubmitted($event)"></app-common-outlet-cafe-select>
  </div>
  <div *ngIf="!isAdmin">
    <app-common-outlet-cafe-select [config]="headerConfig"
      (submitted)="filterSubmitted($event)"></app-common-outlet-cafe-select>
  </div>
  <div *ngIf="reviewList.length > 0" class="pb-4">
    <div class="row my-2 align-items-center">
      <div class="col-12 col-md-8">
        <div class="d-flex flex-wrap gap-2">
        </div>
      </div>
      <div class="col-12 col-md-4 d-flex justify-content-end gap-2 mt-2 mt-md-0">

        <button mat-mini-fab class="excel-btn" matTooltip="Excel Export" (click)="excelExport()">
          <mat-icon>table_chart</mat-icon>
        </button>
        <button mat-mini-fab color="primary" (click)="downloadPdf()" matTooltip="Download PDF">
          <mat-icon>picture_as_pdf</mat-icon>
        </button>

        <button mat-mini-fab color="primary" (click)="changeDataView()" matTooltip="Change View" class="btn iconBtn">
          <i class="bi" [ngClass]="isChartShow ? 'bi-table' : 'bi-graph-down'"></i>
        </button>
      </div>
    </div>
    <div class="mt-2" *ngIf="paginatedReviewList.length > 0">
      <ng-container *ngIf="!isChartShow">

        <div class="feedback-container" *ngFor="let feedback of paginatedReviewList; let i = index">
          <app-org-order [order]="feedback"></app-org-order>
        </div>
        <!-- Paginator -->
        <mat-paginator [length]="reviewList.length" [pageSize]="pageSize" [pageIndex]="pageIndex"
          [pageSizeOptions]="[10, 50, 100, 200, 500]" (page)="onPageChange($event)" showFirstLastButtons>
        </mat-paginator>

      </ng-container>
      <div class="row" *ngIf="isChartShow">
        <div class="col-12">
          <div class="card shadow border-0 rounded-lg card-hover overflow-hidden">
            <highcharts-chart *ngIf="reviewList.length > 0" [Highcharts]="Highcharts" [options]="chartOptionsPie"
              [update]="updateStatusFlag" [oneToOne]="oneToOneStatusFlag"
              style="width: 100%; height: 400px; display: block">
            </highcharts-chart>

            <div class="h-100 d-flex justify-content-center align-items-center pt-2">
              <p *ngIf="reviewList.length <= 0">No Data Found</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <mat-card class="center labelText mt-2 py-2 rounded-4" *ngIf="reviewList.length == 0">
    No Reviews found
  </mat-card>
