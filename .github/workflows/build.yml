name: Build

on:
  push:
    branches:
      - main
      - staging
  pull_request:
    branches:
      - main
      - staging

jobs:
  build:
    name: Build (${{ github.ref_name == 'main' && 'production' || 'staging' }})
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '16.16.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (production)
        if: github.ref_name == 'main'
        run: npm run buildprod

      - name: Build (staging)
        if: github.ref_name == 'staging'
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.ref_name == 'main' && 'production' || 'staging' }}-${{ github.run_number }}
          path: dist/dashboard-deskdyne/
          retention-days: 7
