<div class="bgpadding1" *ngIf="showSearchSection">
    <div class="right addBtn addOutlet" *ngIf="true || btnPolicy?.addVendor" (click)="addVendor()">
        +
    </div>
    <div class="row">
        <div *ngIf="vendorList && vendorList.length == 0" class="center mt-5">
            No Vendor Firm Found
        </div>
        <div class="mt-3" *ngIf="vendorList && vendorList.length > 0">
            <div *ngFor="let vendor of vendorList" class="cardDesign">
                <div class="container-fluid">
                    <div class="row">
                        <div class="col-md-11">
                            <div class="row">
                                <div class="col-md-3">
                                    <div class="labelText">Vendor Firm Name</div>
                                    <div class="labelData">{{ vendor.vendorFirmName }}</div>
                                </div>
                            </div>

                            <div class="cafeteriaCard">
                                <div class="row">
                                    <div class="col-md-3 p-0">
                                        <div class="labelText">Outlet Name</div>
                                        <div class="d-flex">
                                           <div class="labelData" *ngFor="let cafeteria of vendor.outletList" ><mat-chip> {{cafeteria.outletName}}</mat-chip>
                                        </div>
                                        </div>
                                       
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-1 alignRight">
                                <mat-icon *ngIf="true || btnPolicy?.editVendor" (click)="editVendor(vendor)" color="primary"> edit </mat-icon>
                                <mat-icon *ngIf="true || btnPolicy?.deleteVendor" (click)="showPopup(vendor)"  color="warn">delete</mat-icon>
                            <!-- <i *ngIf="true || btnPolicy?.editVendor" class="bi bi-pencil-square editDeltesaveIcon me-2"
                                (click)="editVendor(vendor)"></i>
                            <i class="bi bi-trash editDeltesaveIcon" *ngIf="true || btnPolicy?.deleteVendor"
                                (click)="showPopup(vendor)"></i> -->
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

<div class="bgsidepadding2" *ngIf="!showSearchSection">
    <app-vendor-firm-view [vendor]="vendorInfo" (back)="toggleShowOrder($event)"></app-vendor-firm-view>
</div>
