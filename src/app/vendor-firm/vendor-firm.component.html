<div class="container-fluid pe-4 ps-4" *ngIf="showSearchSection">
  <div class="d-flex flex-column flex-sm-row align-items-center justify-content-between gap-4 ">
    <div class="g-0">
      <h4 class="m-0 fw-semibold">Vendor Firm</h4>
    </div>
    <div class="d-flex justify-content-end align-items-center gap-3">
      <div class="input-group" class="text-nowrap d-none d-md-inline-flex">
        <mat-form-field appearance="outline" class="search-input">
          <input matInput type="text" placeholder="Search vendor firm..." [formControl]="searchControl" />
          <button mat-icon-button matSuffix aria-label="Search">
            <mat-icon>search</mat-icon> </button>
        </mat-form-field>
      </div>
      <button mat-raised-button color="primary" class="text-nowrap responsive-btn" (click)="addVendor()">
        <mat-icon>add_business</mat-icon>
        Add Vendor Firm
      </button>
    </div>
    <div class="d-inline-flex d-md-none w-100">
      <mat-form-field appearance="outline" class="search-input w-100">
        <input matInput type="text" placeholder="Search vendor firm..." [formControl]="searchControl" />
        <button mat-icon-button matSuffix aria-label="Search">
          <mat-icon>search</mat-icon> </button>
      </mat-form-field>
    </div>
  </div>
</div>
<div *ngIf="showSearchSection">
  <div class="row w-100 m-0">
    <div *ngIf="vendorList && vendorList.length == 0" class="center mt-5">
      No Vendor Firm Found
    </div>
    <div class="vendor-wrapper" *ngIf="vendorList && vendorList.length > 0">
      <div *ngFor="let vendor of pagedVendorFirm" class="vendor-card">
        <div class="vendor-grid">
          <div class="vendor-info">
            <div class="info-grid">
              <div class="field">
                <div class="labelText">Vendor Firm Name</div>
                <div class="labelData">{{ vendor.vendorFirmName }}</div>
              </div>
              <div class="field">
                <div class="labelText">Vendor Firm Email</div>
                <div class="labelData">{{ vendor.vendorFirmEmail }}</div>
              </div>
              <div class="field">
                <div class="labelText">Vendor Phone Number</div>
                <div class="labelData">{{ vendor.vendorFirmPhoneNo }}</div>
              </div>
            </div>
            <div class="outlet-section">
              <div class="labelText">Outlet Name</div>
              <div class="outlet-chips">
                <mat-chip *ngFor="let cafeteria of vendor.outletList">
                  {{ cafeteria?.outletName ? cafeteria.outletName : 'NA' }}
                </mat-chip>
              </div>
            </div>
          </div>
          <div class="vendor-actions">
            <mat-icon *ngIf="true || btnPolicy?.editVendor" (click)="editVendor(vendor)"
              color="primary">visibility</mat-icon>
            <mat-icon *ngIf="true || btnPolicy?.deleteVendor" (click)="showPopup(vendor)" color="warn">delete</mat-icon>
          </div>
        </div>
      </div>
      <div class="paginator">
        <mat-paginator [length]="vendorList.length || 0" [pageSize]="pageSize" [pageIndex]="pageIndex"
          [pageSizeOptions]="[3,5,10,15]" (page)="onPageChange($event)">
        </mat-paginator>
      </div>
    </div>
  </div>
</div>
<div *ngIf="!showSearchSection">
  <app-vendor-firm-view [vendor]="vendorInfo" (back)="toggleShowOrder($event)"></app-vendor-firm-view>
</div>
