<nav class="navbar fixed-top navbar-dark bg-dark mb-5">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h1"><img src="/assets/images/menu-burger.svg" class="menu-burger" alt=""
                (click)="openEnd()"><span class="company-name"> <ng-container *ngIf="!isOrgAdmin">
                    <img src="assets/images/deskdyneLogo.png" alt="deskdyneLogo" style="width: 15%;height: 15%;">
                </ng-container>
                <ng-container *ngIf="isOrgAdmin">
                    {{orgDetails.organization_name}}
                </ng-container></span></span>
        <span style="color:white">{{breadCrumbText}}</span>
        <span>
            <span class="name">{{adminProfile.name}}</span>
            <img placement="bottom-right" class="profileImg pointer mr-2" *ngIf="adminProfile.imageUrl"
                [src]="imageUrl+adminProfile.imageUrl" [ngbPopover]="popOverBody" popoverTitle="Admin Profile">
            <span [ngbPopover]="popOverBody" popoverTitle="Admin Profile" *ngIf="!adminProfile.imageUrl"
                class="img-span pointer"><i class="bi bi-person"></i></span>
        </span>
    </div>
</nav>

        <ng-container>
            <div *ngFor="let link of finalNavOption; let i = index">
                <div *ngIf="link.showParent">
                <div class="orgbutton" [ngClass]="{ 'active-link': selectedIndex === i}"                 
                (click)="selectLink(link,i)">
                    <img *ngIf="selectedIndex === i" 
                        [src]="'assets/images/' + link.imageblue + '.svg'" 
                        alt="Active Icon" 
                        style="margin-right: 10px; width: 20px; height: 20px;"/>
                    <img *ngIf="selectedIndex !== i" 
                        [src]="'assets/images/' + link.image + '.svg'" 
                        alt="Inactive Icon" 
                        style="margin-right: 10px; width: 20px; height: 20px;"/>
                    {{ link.name }}
                </div>
                <div *ngIf="link.children && openChildSectionIndex === i">
                    <div *ngFor="let childLink of link.children; let j = index">
                        <div *ngIf="childLink.showChild" class="childMenuStyle" type="button" (click)="selectChildLink(childLink.route,i,j)"
                        [ngClass]="{ 'active-link': openChildSectionIndex === i && childSelectedIndex === j }">
                        {{ childLink.name }}
                    </div>
                    </div>
                </div>
            </div>  
            </div>             
        </ng-container>  
    </div>
</ng-template>

<ng-template #popOverBody>
    <div class="popover-wrapper">
        <div class="">
            <span class="bold">Admin Name: </span>
            <span class="grey">{{adminProfile.name}}</span>
        </div>
        <div class="mt-2">
            <span class="bold">Admin ID: </span>
            <span class="grey">{{adminProfile.loginId}}</span>
        </div>
        <div class="mt-2">
            <span class="bold">phoneNo: </span>
            <span class="grey">{{adminProfile.phoneNo}}</span>
        </div>
        <div class="mt-2">
            <span class="bold">Email: </span>
            <span class="grey">{{adminProfile.email}}</span>
        </div>
        <div class="mt-2">
            <button class="btn btn-primary" (click)="logout()">logout</button>
        </div>
    </div>
</ng-template>
