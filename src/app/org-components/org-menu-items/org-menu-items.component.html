<div class="container-fluid">
  <h3 class="pb-4">Menu Items</h3>
  <app-common-outlet-cafe-select [config]="headerConfig"
    (submitted)="filterSubmitted($event)"></app-common-outlet-cafe-select>
  <div class="d-flex justify-content-end align-items-center w-100 mt-2">
    <button type="button" *ngIf="outletOrderData.length > 0" mat-stroked-button color="primary"
      (click)="openItemBreakdownModal()">
      Details breakdown
    </button>
  </div>
  <div class="card-hover mt-2">
    <!-- Chart -->
    <highcharts-chart *ngIf="outletOrderData.length > 0" [Highcharts]="Highcharts" [options]="chartOptions"
      [update]="updateFlag" [oneToOne]="oneToOneFlag" style="width: 100%; height: 400px; display: block">
    </highcharts-chart>

    <!-- No Data -->
    <mat-card class="center labelText py-2 rounded-4" *ngIf="outletOrderData.length<=0">
      No Menu Items Found
    </mat-card>
  </div>

</div>
