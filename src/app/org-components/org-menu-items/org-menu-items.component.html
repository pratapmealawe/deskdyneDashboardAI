<div class="page-container">

  <!-- ── Header Card ──────────────────────────────────────────── -->
  <div class="header-card">
    <div class="header-content">
      <div class="title-section">
        <h1 class="page-title">Menu Items</h1>
        <p class="page-subtitle">Item-wise distribution from completed orders</p>
      </div>
      <div class="actions-section" *ngIf="outletOrderData.length > 0">
        <button mat-flat-button class="btn-breakdown" (click)="openItemBreakdownModal()">
          <mat-icon>list_alt</mat-icon> Details Breakdown
        </button>
      </div>
    </div>
  </div>

  <!-- ── Content Body ─────────────────────────────────────────── -->
  <div class="content-body">

    <!-- Filter Section -->
    <div class="filter-wrapper">
      <app-common-outlet-cafe-select [config]="headerConfig"
        (submitted)="filterSubmitted($event)">
      </app-common-outlet-cafe-select>
    </div>

    <!-- Chart Card -->
    <div class="chart-card" *ngIf="outletOrderData.length > 0">
      <highcharts-chart
        [Highcharts]="Highcharts"
        [options]="chartOptions"
        [update]="updateFlag"
        [oneToOne]="oneToOneFlag"
        style="width:100%; height:420px; display:block;">
      </highcharts-chart>
    </div>

    <!-- Empty State -->
    <div class="empty-state" *ngIf="outletOrderData.length === 0">
      <mat-icon class="empty-icon">restaurant_menu</mat-icon>
      <h3>No Menu Items Found</h3>
      <p>Select an outlet and date range to view item distribution.</p>
    </div>

  </div>
</div>
