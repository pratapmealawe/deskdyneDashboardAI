<div class="container">
  <h3 class="mb-4">Submit Checklist</h3>
  <div class="container">
    <div class="row mb-4 mt-3 p-3 bg-light rounded">
      <div class="col-12 col-md-3">
        <label for="organization" class="labelText d-block">Organization</label>
        <select
          [disabled]="editMode"
          class="form-select"
          [(ngModel)]="filterObj.orgId"
          (change)="setOrgDetails()"
        >
          <option selected disabled value="">Select Organization</option>
          <option *ngFor="let option of orglist" [value]="option._id">
            {{ option.organization_name }}
          </option>
        </select>
      </div>

      <div class="col-12 col-md-3">
        <label for="cafeteria" class="labelText d-block">Cafeteria</label>
        <select
          [disabled]="cafeList.length <= 0 || editMode"
          class="form-select"
          [(ngModel)]="filterObj.cafeteria_id"
          (change)="changeCafe()"
        >
          <option selected disabled value="">Select Cafeteria</option>
          <option *ngFor="let option of cafeList" [value]="option.cafeteria_id">
            {{ option.cafeteria_name }}
          </option>
        </select>
      </div>

      <div class="col-12 col-md-3">
        <label for="exampleFormControlInput2" class="labelText d-block"
          >Search</label
        >

      <div class="searchDiv">
        <i class="bi bi-search"></i>
        <input
          type="text"
          (input)="searchFilter($event)"
          class="form-control"
          placeholder="Search"
          aria-label="Search Filter"
          aria-describedby="basic-addon2"
        />
        </div>
      </div>
    </div>
    <div
      class="row cardDesign mb-3"
      *ngFor="let question of filteredChecklistQuestions"
    >
      <div class="col-lg-1">
        <input
          type="checkbox"
          class="form-check-input checkbox"
          [(ngModel)]="question.selected"
        />
      </div>
      <div class="col-lg-8">
        {{ question.checklistQuestion }}
      </div>

      <div class="col-lg-3">
        <input
          type="text"
          class="form-control"
          placeholder="Enter Comment"
          [(ngModel)]="question.comment"
        />
      </div>
    </div>
  </div>
  <div class="row mt-4">
    <div class="col-lg-12">
      <button
        [disabled]="!filterObj.orgId && !filterObj.cafeteria_id"
        class="btn btn-primary me-2"
        (click)="submitChecklist()"
        *ngIf="!editMode && true || btnPolicy?.addChecklist"
      >
        Save
      </button>
      <button
        [disabled]="!filterObj.orgId && !filterObj.cafeteria_id"
        class="btn btn-success me-2"
        (click)="updateChecklist()"
        *ngIf="editMode && true || btnPolicy?.editChecklist"
      >
        Update
      </button>
      <button class="btn btn-danger me-1" (click)="cancelChecklistSubmit()">
        Cancel
      </button>
    </div>
  </div>
</div>
