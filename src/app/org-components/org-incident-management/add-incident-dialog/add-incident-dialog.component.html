<div class="header d-flex justify-content-between align-items-center mb-3">
    <h2 mat-dialog-title class="m-0">{{ isEdit ? 'Update' : 'Add' }} Incident</h2>
    <button mat-icon-button (click)="close()">
        <mat-icon>close</mat-icon>
    </button>
</div>

<mat-dialog-content>
    <!-- Redoing Form Layout properly -->
    <form [formGroup]="form" class="row g-3 pt-2">
        <div class="col-md-6">
            <mat-form-field appearance="outline" class="w-100">
                <mat-label>Type</mat-label>
                <input matInput formControlName="incidentType" placeholder="e.g., Food Quality">
            </mat-form-field>
        </div>

        <div class="col-md-6">
            <mat-form-field appearance="outline" class="w-100">
                <mat-label>Subject</mat-label>
                <input matInput formControlName="incidentSubject" placeholder="Brief subject">
            </mat-form-field>
        </div>

        <div class="col-12">
            <mat-form-field appearance="outline" class="w-100">
                <mat-label>Description</mat-label>
                <textarea matInput formControlName="incidentDescription" rows="3"></textarea>
            </mat-form-field>
        </div>

        <div class="col-md-6">
            <mat-form-field appearance="outline" class="w-100">
                <mat-label>Status</mat-label>
                <mat-select formControlName="status" [disabled]="!isEdit">
                    <mat-option *ngFor="let s of statusList" [value]="s">{{s | titlecase}}</mat-option>
                </mat-select>
            </mat-form-field>
        </div>

        <!-- Photo Upload -->
        <div class="col-12">
            <div class="d-flex flex-column gap-2">
                <label class="fw-bold">Photo</label>
                <div class="d-flex align-items-center gap-3">
                    <button class="btn-import" type="button" mat-stroked-button (click)="fileInput.click()">
                        <mat-icon>add_a_photo</mat-icon> Upload Photo
                    </button>
                    <input #fileInput type="file" (change)="onFileSelected($event)" accept="image/*" hidden>

                    <div *ngIf="imagePreview" class="image-preview border rounded p-1">
                        <img [src]="imagePreview" alt="Preview" style="height: 60px; width: auto;">
                    </div>
                </div>
            </div>
        </div>

    </form>
</mat-dialog-content>

<mat-dialog-actions align="end" class="pb-3 pe-3">
    <button mat-button (click)="close()">Cancel</button>
    <button class="btn-add" mat-raised-button color="primary" (click)="submit()"
        [disabled]="form.invalid || isUploading">
        <mat-icon>{{ isEdit ? 'update' : 'save' }}</mat-icon> {{ isUploading ? 'Uploading...' : (isEdit ? 'Update' :
        'Save') }}
    </button>
</mat-dialog-actions>
