<div class="filter-dialog">
  <!-- Header -->
  <div class="dialog-header">
    <div class="header-left">
      <mat-icon class="header-icon">filter_list</mat-icon>
      <div>
        <h2 class="dialog-title">Filter Dashboard</h2>
        <span class="active-badge" *ngIf="activeCount > 0">{{ activeCount }} active</span>
      </div>
    </div>
    <button mat-icon-button class="close-btn" (click)="cancel()">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <!-- Body -->
  <div class="dialog-body">

    <!-- Cafeteria -->
    <div class="filter-group mt-3">
      <label class="filter-label">
        <mat-icon>storefront</mat-icon> Cafeteria
      </label>
      <mat-form-field appearance="outline" class="w-100">
        <mat-label>Select Cafeteria</mat-label>
        <mat-select [(value)]="selectedCafeteriaId">
          <mat-option value="">All Cafeterias</mat-option>
          <mat-option *ngFor="let c of data.cafeList" [value]="c.cafeteria_id">
            {{ c.cafeteria_name }}
          </mat-option>
        </mat-select>
      </mat-form-field>
    </div>

  </div>

  <!-- Footer -->
  <div class="dialog-footer">
    <button mat-stroked-button class="btn-clear" (click)="clearAll()" *ngIf="activeCount > 0">
      <mat-icon>filter_alt_off</mat-icon> Clear All
    </button>
    <div class="footer-right">
      <button mat-stroked-button class="btn-cancel" (click)="cancel()">Cancel</button>
      <button mat-flat-button class="btn-apply" (click)="apply()">
        <mat-icon>check</mat-icon> Apply
        <span class="apply-count" *ngIf="activeCount > 0">({{ activeCount }})</span>
      </button>
    </div>
  </div>
</div>
