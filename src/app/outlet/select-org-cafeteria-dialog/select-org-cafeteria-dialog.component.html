<h2 mat-dialog-title>Select Organization & Cafeteria</h2>

<mat-dialog-content>
  <div class="search-box mb-3">
    <mat-form-field appearance="outline" class="w-100 custom-field dense-field">
      <mat-label>Search Organization or Cafeteria</mat-label>
      <input matInput [(ngModel)]="orgSearchText" placeholder="Search..." autocomplete="off">
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>
  </div>

  <div class="org-list">
    <div class="org-item" *ngFor="let org of filteredOrgList" (click)="selectOrg(org)"
      [ngClass]="{ selected: selectedOrgCafeteria === org.key }">
      <mat-radio-button [checked]="selectedOrgCafeteria === org.key"
        (click)="$event.stopPropagation(); selectOrg(org)">
        {{ org.key }}
      </mat-radio-button>
    </div>
    <div *ngIf="filteredOrgList.length === 0" class="empty-placeholder py-4">
      <mat-icon>search_off</mat-icon>
      <p>No matches found for "{{ orgSearchText }}"</p>
    </div>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button type="button" (click)="onCancel()">Cancel</button>
  <button mat-raised-button color="primary" type="button" (click)="onAdd()"
    [disabled]="!selectedOrgCafeteria">
    Add
  </button>
</mat-dialog-actions>
