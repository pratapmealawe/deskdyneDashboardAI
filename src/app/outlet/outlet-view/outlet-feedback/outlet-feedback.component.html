<div class="bgsidepadding1">
    <div class="mt-2" *ngIf="feedbackList.length>0">
        <div class="row" *ngFor="let feedback of feedbackList; let i = index">
            <app-org-order [order]="feedback"></app-org-order>
        </div>
        <button *ngIf="nextOn" type="button" class="btn btn-primary btn-sm mt-2 me-2" (click)="getMore()">Load
            More</button>
    </div>
    <div class="center labelText mt-2" *ngIf="feedbackList.length==0">
        No Feedback found
    </div>
</div>
