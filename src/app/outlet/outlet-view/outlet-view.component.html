<div class="outlet-view-container">
    <!-- Header Section -->
    <div class="outlet-header-card">
        <div class="header-left">
            <button mat-icon-button class="back-btn" (click)="goBack()">
                <mat-icon>arrow_back</mat-icon>
            </button>
            <div class="title-section">
                <h1 class="page-title">
                    {{ outlet?.outletName || 'Outlet Details' }}
                </h1>
                <p class="page-subtitle">
                    Manage outlet menus, orders & reviews
                </p>
            </div>
        </div>
        <div class="header-right">
            <div class="status-badge" [ngClass]="outlet?.isOpen ? 'open' : 'closed'">
                <mat-icon>{{ outlet?.isOpen ? 'check_circle' : 'cancel' }}</mat-icon>
                <span>{{ outlet?.isOpen ? 'Open' : 'Closed' }}</span>
            </div>
        </div>
    </div>

    <!-- Tab Navigation -->
    <div class="tabs-container">
        <div class="main-tabs">
            <button *ngFor="let view of outletViewList; let i = index" class="tab-btn"
                [class.active]="selectedtab === i" (click)="selectedtab = i; gotToTab(view.path)">
                <mat-icon class="tab-icon">{{ view.icon }}</mat-icon>
                <span>{{ view.name }}</span>
            </button>
        </div>
    </div>

    <!-- Tab Content -->
    <div class="tab-content">
        <router-outlet></router-outlet>
    </div>
</div>
