<div class="goback">
    <button class="btn btn-primary btn-sm" (click)="goBack()">Back</button>
</div>
<div>
    <div class="row">
        <div class="col-4 col-md-3 col-lg-2 bgpadding1" *ngFor="let view of outletViewList"
            [ngClass]="{tileSelected: selectedTab === view.path}" (click)="gotToTab(view.path)">
            <div class="tileLabel header4 countTile">{{view.name}}</div>
        </div>
    </div>
</div>
<div *ngIf="selectedTab==='outlet-details'">
    <app-outlet-details [outletObj]="outlet"></app-outlet-details>
</div>
<div *ngIf="selectedTab==='outlet-categories'">
    <app-outlet-categories [outletObj]="outlet"></app-outlet-categories>
</div>
<div *ngIf="selectedTab==='outlet-menu'">
    <app-outlet-menu [outletObj]="outlet"(back)="updateOutlet($event)"></app-outlet-menu>
</div>
<div *ngIf="selectedTab==='outlet-feedback'">
    <app-outlet-feedback [outletObj]="outlet"></app-outlet-feedback>
</div>

<div *ngIf="selectedTab==='outlet-vendor'">
    <app-outlet-vendor [outlet]="outlet" ></app-outlet-vendor>
</div>
