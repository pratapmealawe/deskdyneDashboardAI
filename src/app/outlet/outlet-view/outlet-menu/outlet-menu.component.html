<div class="bgsidepadding1">
    <!-- <div class="labelText">Add Menu Items</div> -->
    <div class="ms-2 addBtn right" (click)="addMenuItem()">+</div>
    <div [formGroup]="form">
        <div formArrayName="menuList">
            <div class="row" [formGroupName]="i" *ngFor="let control of menuList.controls; let i = index">
                <div class="col-12 col-md-6 col-lg-4">
                    <label class="labelText form-label">Tax Group</label>
                    <select class="custom-select" name="role" formControlName="taxGroup">
                        <option disabled selected value> -- select type -- </option>
                        <option value="GST Included">GST Included</option>
                    </select>
                </div>
                <div class="col-12 col-md-6 col-lg-4">
                    <!-- <pre>{{outletObj.category|json}}</pre> -->
                    <label class="labelText form-label">Category</label>
                    <select class="custom-select" name="role" formControlName="category" (change)="setCategory($event, i)">
                        <option disabled selected value> -- select category -- </option>
                        <option [value]="cat.name" *ngFor="let cat of outletObj.category">{{cat.name}}</option>
                        <!-- <option value="Kulfi">Kulfi</option> -->
                    </select>
                </div>
                <div class="col-12 col-md-6 col-lg-4" *ngIf="categorySelected">
                    <label class="labelText form-label">Sub Category</label>
                    <select class="custom-select" name="role" formControlName="subCategory">
                        <option disabled selected value> -- select sub category -- </option>
                        <option [value]="subcat" *ngFor="let subcat of subcategoryList">{{subcat}}</option>
                        <!-- <option value="Kulfi">Sundae</option> -->
                    </select>
                </div>
                <div class="col-12 col-md-6 col-lg-4">
                    <label class="labelText form-label">Name</label>
                    <input type="text" class="form-control" placeholder="Name" formControlName="itemName">
                </div>
                <div class="col-12 col-md-6 col-lg-2">
                    <label class="labelText form-label">Price</label>
                    <input type="number" class="form-control" placeholder="Price" formControlName="price">
                </div>
                <div class="col-12 col-md-6 col-lg-2">
                    <label class="labelText form-label">Transfer Price</label>
                    <input type="number" class="form-control" placeholder="Transfer Price"
                        formControlName="transferPrice">
                </div>
                <div class="col-12 col-md-6 col-lg-2">
                    <label class="labelText form-label">Display Order No</label>
                    <input type="number" class="form-control" placeholder="Display Order No" formControlName="priority">
                </div>
                <div class="col-12 col-md-6 col-lg-2">
                    <label class="labelText form-label">Code</label>
                    <input type="text" class="form-control" placeholder="Code" formControlName="code">
                </div>
                <div class="col-sm-12 col-md-4 col-lg-2">
                    <input class="me-1" type="checkbox" id="recommended" formControlName="recommended">
                    <label class="labelText form-label" for="recommended">Recommended</label>
                </div>
                <div class="col-sm-12 col-md-4 col-lg-2">
                    <input class="me-1" type="checkbox" id="isSpicy" formControlName="isSpicy">
                    <label class="labelText form-label" for="isSpicy">Is Spicy</label>
                </div>
                <div class="col-sm-12 col-md-4 col-lg-2">
                    <input class="me-1" type="checkbox" id="isVeg" formControlName="isVeg">
                    <label class="labelText form-label" for="isVeg">Vegetarian</label>
                </div>
                <div class="col-sm-12 col-md-4 col-lg-2">
                    <input class="me-1" type="checkbox" id="isActive" formControlName="isActive">
                    <label class="labelText form-label" for="isActive">Active</label>
                </div>
                <div class="col-sm-12 col-md-4 col-lg-2">
                    <input class="me-1" type="checkbox" id="mealVoucherApplicable"
                        formControlName="mealVoucherApplicable">
                    <label class="labelText form-label" for="mealVoucherApplicable">Meal Voucher Applicable</label>
                </div>
                <div class="col-sm-12 col-md-4 col-lg-2">
                    <input class="me-1" type="checkbox" id="isPrePrepared" formControlName="isPrePrepared">
                    <label class="labelText form-label" for="isPrePrepared">Is Pre Prepared</label>
                </div>
                <div class="col-sm-12 col-md-4 col-lg-4">
                    <input class="me-1" type="checkbox" id="priceIncludesTax" formControlName="priceIncludesTax">
                    <label class="labelText form-label" for="priceIncludesTax">Is Price Includes tax?</label>
                </div>
                <div class="col-sm-12 col-md-4 col-lg-4">
                    <input class="me-1" type="checkbox" id="hideItemPrice" formControlName="hideItemPrice">
                    <label class="labelText form-label" for="hideItemPrice">Hide Item Price</label>
                </div>
                <div class="col-sm-12 col-md-4 col-lg-4">
                    <label class="labelText form-label" for="mrp">MRP/Non-MRP</label>
                    <select class="custom-select" id="mrp" name="role" formControlName="mrp">
                        <option disabled selected value> -- select any -- </option>
                        <option value="MRP">MRP</option>
                        <option value="nonMRP">Non-MRP</option>
                    </select>
                </div>
                <div class="col-sm-12 col-md-4 col-lg-6">
                    <label class="labelText form-label" for="description">Description</label>
                    <input class="form-control me-1" type="text" id="description" formControlName="description">
                </div>
                <div class="col-sm-12 col-md-4 col-lg-6">
                    <label class="labelText form-label" for="calories">Calories</label>
                    <input class="form-control me-1" type="text" id="calories" formControlName="calories">
                </div>
                <div class="col-sm-12 col-md-4 col-lg-4">
                    <label class="labelText form-label" for="parcelChargeType">Parcel Charge Type</label>
                    <select class="custom-select" id="parcelChargeType" name="role" formControlName="parcelChargeType">
                        <option disabled selected value> -- select any -- </option>
                        <option value="Flat">Flat</option>
                        <option value="Percentage">Percentage</option>
                    </select>
                </div>
                <div class="col-sm-12 col-md-4 col-lg-4">
                    <label class="labelText form-label" for="parcelChargeValue">Parcel Charge Value</label>
                    <input class="form-control me-1" type="text" id="parcelChargeValue"
                        formControlName="parcelChargeValue">
                </div>
                <div class="mt-2" *ngIf="menuList.length>0">
                    <button class="btn-primary btn-sm btn me-2" (click)="submit()">Submit</button>
                    <button class="btn-danger btn-sm btn" (click)="removeMenuItem(i)">Remove</button>
                </div>
            </div>
        </div>
    </div>
    
</div>
