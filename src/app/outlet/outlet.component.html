<div class="outlet-header" *ngIf="showSearchSection">
  <div>
    <h4 class="m-0 fw-semibold">Outlet</h4>
  </div>
  <div class="header-actions">
    <div class="input-wrapper">
      <mat-form-field appearance="outline" class="w-100 search-input">
        <input matInput type="text" placeholder="Search outlet..." [formControl]="searchControl" />
        <button mat-icon-button matSuffix aria-label="Search" class="search-icon">
          <mat-icon>search</mat-icon>
        </button>
      </mat-form-field>
    </div>

    <button mat-raised-button color="primary" (click)="addOutlet()">
      <mat-icon>add_circle</mat-icon> Add Outlet
    </button>
  </div>
</div>
<div *ngIf="outletList && outletList.length === 0" class="text-center text-muted my-5">
  No Outlet Found
</div>
<div *ngIf="outletList && outletList.length > 0 && showSearchSection" class="container-fluid pb-4">
  <app-outlet-card [outlet]="pagedOutLet" (view)="viewOutlet($event)"></app-outlet-card>
</div>
<div class="center mt-5" *ngIf="outletList.length === 0">No Records Found</div>
<div class="container-fluid pb-4" *ngIf="!showSearchSection && outletList.length > 0">
  <app-outlet-view [outlet]="selectedOutlet" (back)="toggleShowOrder($event)"></app-outlet-view>
</div>
