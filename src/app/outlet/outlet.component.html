<div class="outlet-page-container">
  <!-- Header Section -->
  <div class="outlet-header-card" *ngIf="isListingView">
    <div class="header-content">
      <div class="title-section">
        <h1 class="page-title">Outlet Management</h1>
        <p class="page-subtitle">Manage outlets across your organizations</p>
      </div>
      <div class="actions-section">
        <div class="search-wrapper">
          <mat-icon class="search-icon">search</mat-icon>
          <input type="text" placeholder="Search outlets..." [formControl]="searchControl" />
        </div>
        <button mat-flat-button class="btn-add-outlet" (click)="addOutlet()" *appHasPermission="'OUTLET:ADD'">
          <mat-icon>add_business</mat-icon>
          <span>Add Outlet</span>
        </button>
        <button mat-icon-button class="btn-deleted" (click)="openDeletedOutletsDialog()" *appHasPermission="'OUTLET:DELETE'"
          matTooltip="View Deleted Outlets">
          <mat-icon>delete_sweep</mat-icon>
        </button>
      </div>
    </div>
  </div>

  <!-- Content Body -->
  <div class="content-body" *ngIf="isListingView">
    <div *ngIf="outletList && outletList.length === 0; else outletListTmp" class="empty-state">
      <mat-icon class="empty-icon">storefront</mat-icon>
      <h3>No Outlets Found</h3>
      <p>Get started by adding your first outlet.</p>
      <button mat-stroked-button color="primary" (click)="addOutlet()" *appHasPermission="'OUTLET:ADD'">Add Outlet</button>
    </div>

    <ng-template #outletListTmp>
      <div class="outlet-list-wrapper">
        <app-outlet-card [outlet]="pagedOutLet" (view)="viewOutlet($event)"
          (softDelete)="onOutletDeleted()"></app-outlet-card>
      </div>
    </ng-template>
  </div>

  <!-- Outlet View Section -->
  <div class="outlet-view-section" [hidden]="isListingView">
    <router-outlet></router-outlet>
  </div>
</div>
