<h2 mat-dialog-title class="dialog-header">
  {{ editType ==='edit' ?'Edit Bulk Master Menu' :'Add Bulk Master Menu' }}
</h2>

<mat-dialog-content class="mat-typography">
  <form [formGroup]="foodItemForm" (ngSubmit)="onSubmit()" novalidate class="mt-2">
    <div class="row">
      <!-- IMAGE UPLOAD -->
      <div class="col-12 col-md-4 d-flex flex-column align-items-center mb-4">
        <input #fileInput type="file" class="uploadInput" accept="image/*" capture="camera"
          (change)="handleFileInput($event)" />
        <div class="image-preview-container" (click)="fileInput.click()">
          <img [src]="imageUrl ? imageUrl :'assets/images/dummyUpload.png'" class="uploadedImage" />
          <div class="image-overlay">
            <mat-icon>camera_alt</mat-icon>
          </div>
        </div>
        <button class="mt-2" type="button" mat-stroked-button color="primary" (click)="fileInput.click()">
          <mat-icon class="me-1">file_upload</mat-icon>
          {{ uploadedImageFile ?'Change Image' :'Upload Image' }}
        </button>
      </div>

      <!-- FORM FIELDS -->
      <div class="col-12 col-md-8">
        <div class="row">
          <div class="col-12 mb-3">
            <mat-form-field appearance="outline" class="w-100">
              <mat-label>Item Name</mat-label>
              <input matInput id="itemName" formControlName="itemName" placeholder="Enter Item Name" />
              <mat-error *ngIf="f['itemName'].touched && f['itemName'].invalid">
                <span *ngIf="f['itemName'].errors?.['required']">Item name is required.</span>
                <span *ngIf="f['itemName'].errors?.['minlength']">Min 2 characters.</span>
                <span *ngIf="f['itemName'].errors?.['maxlength']">Max 80 characters.</span>
              </mat-error>
            </mat-form-field>
          </div>

          <div class="col-12 mb-3">
            <label class="labelText d-block mb-1">Item Type</label>
            <div class="d-flex gap-2 flex-wrap">
              <button type="button" mat-raised-button class="type-btn"
                [color]="f['itemType'].value ==='Veg' ?'primary' :''" (click)="setItemType('Veg')">Veg</button>
              <button type="button" mat-raised-button class="type-btn"
                [color]="f['itemType'].value ==='NonVeg' ?'primary' :''" (click)="setItemType('NonVeg')">NonVeg</button>
              <button type="button" mat-raised-button class="type-btn"
                [color]="f['itemType'].value ==='Jain' ?'primary' :''" (click)="setItemType('Jain')">Jain</button>
            </div>
          </div>

          <div class="col-12 mb-3">
            <label class="labelText d-block mb-1">Serving Type</label>
            <div class="d-flex gap-2 flex-wrap">
              <button type="button" mat-raised-button class="serving-btn"
                [color]="f['itemServingType'].value ==='perPerson' ?'accent' :''"
                (click)="setServingType('perPerson')">perPerson</button>
              <button type="button" mat-raised-button class="serving-btn"
                [color]="f['itemServingType'].value ==='perUnit' ?'accent' :''"
                (click)="setServingType('perUnit')">perUnit</button>
              <button type="button" mat-raised-button class="serving-btn"
                [color]="f['itemServingType'].value ==='perQuantity' ?'accent' :''"
                (click)="setServingType('perQuantity')">perQuantity</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="row mt-3">
      <div class="col-12">
        <label class="labelText d-block mb-1">Pricing Slabs</label>
        <div class="row">
          <div class="col-6 col-md-3">
            <mat-form-field appearance="outline" class="w-100">
              <mat-label>Slab 1</mat-label>
              <input matInput type="number" formControlName="slab1Price" />
            </mat-form-field>
          </div>
          <div class="col-6 col-md-3">
            <mat-form-field appearance="outline" class="w-100">
              <mat-label>Slab 2</mat-label>
              <input matInput type="number" formControlName="slab2Price" />
            </mat-form-field>
          </div>
          <div class="col-6 col-md-3">
            <mat-form-field appearance="outline" class="w-100">
              <mat-label>Slab 3</mat-label>
              <input matInput type="number" formControlName="slab3Price" />
            </mat-form-field>
          </div>
          <div class="col-6 col-md-3">
            <mat-form-field appearance="outline" class="w-100">
              <mat-label>Slab 4</mat-label>
              <input matInput type="number" formControlName="slab4Price" />
            </mat-form-field>
          </div>
        </div>
      </div>
    </div>

    <div class="row mt-3">
      <div class="col-12">
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Description</mat-label>
          <textarea matInput rows="3" formControlName="itemDescription" placeholder="Enter menu item details..."></textarea>
          <mat-error *ngIf="f['itemDescription'].touched && f['itemDescription'].invalid">
            Required. Max 300 chars.
          </mat-error>
        </mat-form-field>
      </div>
    </div>
  </form>
</mat-dialog-content>

<div mat-dialog-actions align="end" class="dialog-actions">
  <button mat-button color="warn" (click)="goToPreviousPage('cancel')">
    <mat-icon>cancel</mat-icon> Cancel
  </button>
  
  <button *ngIf="editType ==='new'" mat-raised-button color="primary" [disabled]="foodItemForm.invalid" (click)="onSubmit()">
    <mat-icon>check_circle</mat-icon> Submit
  </button>

  <button *ngIf="editType ==='edit'" mat-raised-button color="primary" [disabled]="foodItemForm.invalid" (click)="onSubmit()">
    <mat-icon>update</mat-icon> Update
  </button>
</div>
