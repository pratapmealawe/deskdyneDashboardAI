<div class="customer-past-orders-container">
    <div *ngIf="orderList.length > 0; else noOrders" class="row g-4">
        <div [ngClass]="orderList.length === 1 ? 'col-12' : 'col-12 col-md-6'" *ngFor="let order of orderList">
            <app-outlet-order-card [order]="order"></app-outlet-order-card>
        </div>
        
        <div class="load-more-container mt-4 text-center">
            <button *ngIf="nextOn" mat-flat-button color="primary" (click)="getMore()">
                <mat-icon class="me-1">expand_more</mat-icon>
                Load More
            </button>
        </div>
    </div>

    <ng-template #noOrders>
        <div class="empty-state p-5 text-center text-muted">
            <mat-icon class="large-icon mb-3">history_toggle_off</mat-icon>
            <p class="h6">No poll orders found for this user.</p>
        </div>
    </ng-template>
</div>
