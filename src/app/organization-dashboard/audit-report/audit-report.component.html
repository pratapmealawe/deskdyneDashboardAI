<div class="header">
    <h4 class="m-0 fw-semibold">Audit Report</h4>
</div>

<div class="container-fluid pb-4">
    <mat-card class="mt-2">
        <div class="row g-3 py-3 px-3">
            <div class="col-12 col-md-3">
                <mat-form-field appearance="outline" class="w-100">
                    <mat-label>Organization</mat-label>
                    <mat-select [(ngModel)]="selectedOrgId" [disabled]="this.orgAdmin?.role ==='ORGADMIN'"
                        (selectionChange)="onOrgChange($event.value)">
                        <mat-option *ngFor="let org of orglist" [value]="org._id">
                            {{ org.organization_name }}
                        </mat-option>
                    </mat-select>
                </mat-form-field>
            </div>

            <div class="col-12 col-md-3">
                <mat-form-field appearance="outline" class="w-100">
                    <mat-label>Cafeteria</mat-label>
                    <mat-select [(ngModel)]="selectedCafeId" (selectionChange)="onCafeChange($event.value)"
                        [disabled]="!selectedOrgId">
                        <mat-option *ngFor="let cafe of cafeList" [value]="cafe.cafeteria_id">
                            {{ cafe.cafeteria_name }}
                        </mat-option>
                    </mat-select>
                </mat-form-field>
            </div>

            <div class="col-12 col-md-3">
                <mat-form-field appearance="outline" class="w-100">
                    <mat-label>Date</mat-label>
                    <input matInput [matDatepicker]="picker" [(ngModel)]="selectedDate">
                    <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
                    <mat-datepicker #picker></mat-datepicker>
                </mat-form-field>
            </div>

            <div class="col-12 col-md-3">
                <button class="btn-view" mat-raised-button color="primary" (click)="filterSubmitted()"
                    [disabled]="!selectedDate">
                    <mat-icon>filter_list</mat-icon> Filter
                </button>
            </div>
        </div>
    </mat-card>

    <div class="d-flex justify-content-end mt-3" *ngIf="this.orgAdmin?.role !=='ORGADMIN'">
        <button class="btn-add" mat-raised-button color="primary" (click)="openCreateReportDialog()">
            <mat-icon>add</mat-icon> Create New Report
        </button>
    </div>

    <mat-card class="mt-3" *ngIf="auditReports.length > 0; else noData">
        <table mat-table [dataSource]="auditReports">
            <!-- Org Name Column -->
            <ng-container matColumnDef="orgName">
                <th mat-header-cell *matHeaderCellDef> Organization </th>
                <td mat-cell *matCellDef="let element"> {{element.orgName}} </td>
            </ng-container>

            <!-- Cafeteria Name Column -->
            <ng-container matColumnDef="cafeteriaName">
                <th mat-header-cell *matHeaderCellDef> Cafeteria </th>
                <td mat-cell *matCellDef="let element"> {{element.cafeteriaName}} </td>
            </ng-container>

            <!-- Uploaded Date Column -->
            <ng-container matColumnDef="uploadedDate">
                <th mat-header-cell *matHeaderCellDef> Uploaded Date </th>
                <td mat-cell *matCellDef="let element"> {{element.uploadedDate | date}} </td>
            </ng-container>

            <!-- Uploaded By Column -->
            <ng-container matColumnDef="uploadedByName">
                <th mat-header-cell *matHeaderCellDef> Uploaded By </th>
                <td mat-cell *matCellDef="let element"> {{element.uploadedByName}} </td>
            </ng-container>

            <!-- Actions Column -->
            <ng-container matColumnDef="actions">
                <th mat-header-cell *matHeaderCellDef> Actions </th>
                <td mat-cell *matCellDef="let element">
                    <button mat-icon-button color="primary" (click)="viewPdf(element)" matTooltip="View PDF">
                        <mat-icon>visibility</mat-icon>
                    </button>
                    <!-- Edit option removed as per request -->
                    <button mat-icon-button color="warn" (click)="deleteReport(element)" matTooltip="Delete"
                        *ngIf="orgAdmin?.role !=='ORGADMIN'">
                        <mat-icon>delete</mat-icon>
                    </button>
                </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
    </mat-card>

    <ng-template #noData>
        <div class="text-center p-5 text-muted">
            No audit reports found.
        </div>
    </ng-template>
</div>
