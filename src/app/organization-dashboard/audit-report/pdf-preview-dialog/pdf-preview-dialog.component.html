<div class="header d-flex justify-content-between align-items-center mb-2">
    <h2 mat-dialog-title class="m-0">
        <mat-icon style="vertical-align: middle; margin-right: 6px; font-size: 20px;">
            {{isImage ?'image' :'picture_as_pdf'}}
        </mat-icon>
        {{isImage ?'Image Preview' :'Document Preview'}}
    </h2>
    <div class="d-flex align-items-center gap-2">
        <button class="btn-export-pdf" mat-raised-button color="warn" (click)="download()">
            <mat-icon>file_download</mat-icon> Download
        </button>
        <button mat-icon-button (click)="close()">
            <mat-icon>close</mat-icon>
        </button>
    </div>
</div>

<mat-dialog-content class="p-0" style="height: 80vh; overflow: hidden;">
    <iframe *ngIf="pdfUrl && !isImage" [src]="pdfUrl" width="100%" height="100%" frameborder="0"></iframe>
    <div *ngIf="pdfUrl && isImage" class="d-flex justify-content-center align-items-center h-100"
        style="background: #f5f5f5; padding: 16px;">
        <img [src]="pdfUrl" alt="Preview"
            style="max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 8px; box-shadow: 0 4px 24px rgba(0,0,0,0.12);">
    </div>
    <div *ngIf="!pdfUrl" class="d-flex justify-content-center align-items-center h-100">
        <p>No file URL provided.</p>
    </div>
</mat-dialog-content>
