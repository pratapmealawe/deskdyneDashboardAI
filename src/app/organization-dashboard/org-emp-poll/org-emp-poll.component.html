<div class="poll-page-container">
    <!-- Header Card -->
    <div class="export-header-card">
        <div class="header-content">
            <div class="title-section">
                <h1 class="page-title">Employee Poll</h1>
                <p class="page-subtitle">View and export employee poll results</p>
            </div>
            <div class="actions-section">
                <div class="search-wrapper" *ngIf="allPollResults.length > 0 || searchQuery">
                    <mat-icon class="search-icon">search</mat-icon>
                    <input type="text" placeholder="Search employee, phone..." [(ngModel)]="searchQuery"
                        (input)="applySearchFilter()" />
                </div>
                <div class="export-btns" *ngIf="filteredList.length > 0">
                    <button mat-flat-button class="btn-export excel" matTooltip="Excel Export" (click)="excelExport()">
                        <mat-icon>table_chart</mat-icon> Excel
                    </button>
                    <button mat-flat-button class="btn-export pdf" matTooltip="Download PDF" (click)="downloadPdf()">
                        <mat-icon>picture_as_pdf</mat-icon> PDF
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Filter Section -->
    <div class="filter-card p-3 mb-4">
        <app-common-outlet-cafe-select [config]="headerConfig" (submitted)="filterSubmitted($event)">
        </app-common-outlet-cafe-select>
    </div>

    <!-- Content Area -->
    <div class="orders-container">
        <div *ngIf="isLoading" class="loading-container">
            <mat-spinner diameter="40"></mat-spinner>
        </div>

        <div *ngIf="!isLoading">
            <div *ngIf="filteredList.length > 0; else noRecord">
                <div class="orders-list">
                    <app-emp-poll-card *ngFor="let group of filteredList" [orderInput]="group" [hideActions]="true">
                    </app-emp-poll-card>
                </div>
            </div>
        </div>
    </div>

    <!-- Empty State Template -->
    <ng-template #noRecord>
        <div class="empty-state">
            <mat-icon>search_off</mat-icon>
            <h3>No Poll Data Found</h3>
            <p>We couldn't find any poll results matching your criteria. Try adjusting your filters.</p>
        </div>
    </ng-template>
</div>
