<div class="filter-card">
    <div class="filter-row">
        <div class="filter-item">
            <span class="filter-label">Poll Date</span>
            <mat-form-field appearance="outline" class="filter-field">
                <mat-icon matPrefix>event</mat-icon>
                <input matInput [matDatepicker]="pollDatePicker" [(ngModel)]="selectedPollDate" (dateChange)="getEmployeePollList($event.value)"
                    placeholder="Select date">
                <mat-datepicker-toggle matIconSuffix [for]="pollDatePicker"></mat-datepicker-toggle>
                <mat-datepicker #pollDatePicker></mat-datepicker>
            </mat-form-field>
        </div>
        <div class="filter-item" *ngIf="!adminOrg">
            <span class="filter-label">Organization</span>
            <mat-form-field appearance="outline" class="filter-field">
                <mat-icon matPrefix>domain</mat-icon>
                <mat-select placeholder="All Organizations" (selectionChange)="onOrgChange($event.value)">
                    <mat-option [value]="null">All Organizations</mat-option>
                    <mat-option *ngFor="let org of orgList" [value]="org">
                        {{org?.organization_name}}
                    </mat-option>
                </mat-select>
            </mat-form-field>
        </div>
        <div class="filter-item">
            <span class="filter-label">Cafeteria</span>
            <mat-form-field appearance="outline" class="filter-field">
                <mat-icon matPrefix>store</mat-icon>
                <mat-select [(ngModel)]="selectedCafeteria" placeholder="All Cafes">
                    <mat-option [value]="null">All Cafes</mat-option>
                    <mat-option *ngFor="let cafe of cafeteriaList" [value]="cafe?.cafeteria_id">
                        {{cafe?.cafeteria_name}}
                    </mat-option>
                </mat-select>
            </mat-form-field>
        </div>
        <div class="filter-item">
            <span class="filter-label">Search</span>
            <mat-form-field appearance="outline" class="filter-field">
                <mat-icon matPrefix>search</mat-icon>
                <input matInput [(ngModel)]="searchQuery" (input)="applySearchFilter()" placeholder="Search employee, phone...">
            </mat-form-field>
        </div>
        <div class="filter-actions">
            <button mat-flat-button color="primary" (click)="getEmployeePollList(selectedPollDate)">
                <mat-icon>filter_list</mat-icon> Apply
            </button>
            <button mat-stroked-button color="primary" (click)="exportEmployeePollToExcel()" [disabled]="!filteredList?.length || isLoading">
                <mat-icon>download</mat-icon> Export
            </button>
        </div>
    </div>
</div>

<div class="orders-container">
    <div *ngIf="isLoading" class="loading-container">
        <mat-spinner diameter="40"></mat-spinner>
    </div>

    <div *ngIf="!isLoading">
        <div *ngIf="filteredList.length > 0; else noRecord">
            <div class="orders-list">
                <app-org-emp-poll-card *ngFor="let group of filteredList" [orderInput]="group"></app-org-emp-poll-card>
            </div>
        </div>
    </div>
</div>

<ng-template #noRecord>
    <div class="empty-state">
        <mat-icon>search_off</mat-icon>
        <h3>No Poll Data Found</h3>
        <p>We couldn't find any poll results matching your criteria. Try adjusting your filters.</p>
    </div>
</ng-template>
