<div class="bgsidepadding1" *ngIf="showSearchSection">
    <div class="row">
        <div class="col-12 col-md-4 col-lg-6">
            <div class="row">
                <div class="col-12 col-md-6 col-lg-12 bgpadding1">
                    <div class="bold">Org Name</div>
                    <input type="text" class="form-control" placeholder="Org Name"
                        [(ngModel)]="searchObj.organization_name">
                </div>
            </div>
        </div>
        <div class="col-12 col-md-4 col-lg-6">
            <div class="row">
                <div class="col-12 col-md-6 col-lg-12 bgpadding1">
                    <div class="bold">Location</div>
                    <input type="text" class="form-control" placeholder="Location" [(ngModel)]="searchObj.location">
                </div>
            </div>
        </div>
        <div class="col-12 col-md-4 col-lg-4">
            <div class="row">
                <div class="col-12 col-md-6 col-lg-12 bgpadding1">
                    <div class="bold">POC Name</div>
                    <input type="text" class="form-control" placeholder="POC Name"
                        [(ngModel)]="searchObj.poc_details.poc_name">
                </div>
            </div>
        </div>

        <div class="col-12 col-md-4 col-lg-4">
            <div class="row">
                <div class="col-12 col-md-6 col-lg-12 bgpadding1">
                    <div class="bold">POC Ph No</div>
                    <input type="text" class="form-control" placeholder="POC Phone No"
                        [(ngModel)]="searchObj.poc_details.poc_phoneNo">
                </div>
            </div>
        </div>

        <div class="col-12 col-md-4 col-lg-4">
            <div class="row">
                <div class="col-12 col-md-6 col-lg-12 bgpadding1">
                    <div class="bold">POC Email</div>
                    <input type="text" class="form-control" placeholder="POC Email"
                        [(ngModel)]="searchObj.poc_details.poc_email">
                </div>
            </div>
        </div>


        <div class="row mt-2">
            <div class="col-sm-12 col-md-4 col-lg-12">
                <button type="button" class="btn btn-primary btn-sm me-2" (click)="searchOrg()">Search</button>
                <button type="button" class="btn btn-success btn-sm" (click)="resetForm()">Reset</button>
            </div>
        </div>

        <div class="mt-3" *ngIf="orgList && orgList.length > 0">
            <div *ngFor="let org of orgList" class="cardDesign">
                <app-organization-card [organization]="org" (view)="viewOrg($event)"></app-organization-card>
            </div>
            <!-- <button *ngIf="nextOn" type="button" class="btn btn-primary btn-sm" (click)="getMore()">Load
        More</button> -->
        </div>
    </div>
</div>
<div class="bgsidepadding2" *ngIf="!showSearchSection && orgList.length > 0">
    <app-organization-view [organization]="selectedOrg" (back)="toggleShowOrder($event)"></app-organization-view>
</div>
<div class="center mt-5" *ngIf="orgList.length === 0">
    No Records Found
</div>
