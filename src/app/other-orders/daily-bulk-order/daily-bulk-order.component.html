<div class="filter-card">
    <div class="filter-row">
        <div class="filter-item">
            <span class="filter-label">Order Date</span>
            <mat-form-field appearance="outline" class="filter-field">
                <mat-icon matPrefix>calendar_today</mat-icon>
                <input matInput [matDatepicker]="adminDatePicker" [(ngModel)]="selectedAdminOrderDate"
                    (dateChange)="onAdminOrderDateChange($event)" placeholder="Select date">
                <mat-datepicker-toggle matIconSuffix [for]="adminDatePicker"></mat-datepicker-toggle>
                <mat-datepicker #adminDatePicker></mat-datepicker>
            </mat-form-field>
        </div>
        <div class="filter-item flex-grow-1">
            <span class="filter-label">Status</span>
            <div class="status-chips">
                <button *ngFor="let status of adminOrderStatusList" class="status-chip"
                    [class.active]="selectedStatus === status.value"
                    (click)="getLatestBulkDailyOrderStatusList(status.value)">
                    <span>{{status.label}}</span>
                    <span class="chip-count">{{status.count || 0}}</span>
                </button>
            </div>
        </div>
        <div class="filter-actions">
            <button mat-icon-button class="refresh-btn" (click)="refreshOrderList()" matTooltip="Refresh">
                <mat-icon>refresh</mat-icon>
            </button>
            <button mat-stroked-button color="primary" (click)="exportAdminOrdersToExcel()"
                [disabled]="!filteredList || filteredList.length === 0">
                <mat-icon>download</mat-icon> Export
            </button>
        </div>
    </div>
</div>

<div class="orders-container">
    <div *ngIf="isLoading" class="loading-container">
        <mat-spinner diameter="40"></mat-spinner>
    </div>

    <div *ngIf="!isLoading">
        <div *ngIf="filteredList.length > 0; else noRecord">
            <div class="orders-list">
                <ng-container *ngFor="let order of filteredList">
                    <app-daily-bulk-card *ngIf="order.orderType === 'dailyBulk'" [orderInput]="order"
                        (updateOrder)="refreshOrderList()"></app-daily-bulk-card>
                </ng-container>
            </div>

            <!-- Pagination -->
            <div class="pagination-card">
                <div class="pagination-info">
                    <span>Showing <strong>{{pageFirstEntry}}</strong> to <strong>{{pageLastEntry}}</strong> of
                        <strong>{{totalCount}}</strong></span>
                    <mat-form-field appearance="outline" class="page-size-field">
                        <mat-select [value]="pageLimit" (selectionChange)="onPageSizeChange($event.value)">
                            <mat-option *ngFor="let size of pageSizeOptions" [value]="size">{{size}}</mat-option>
                        </mat-select>
                    </mat-form-field>
                </div>
                <div class="pagination-controls">
                    <button class="page-btn" (click)="previous(page)" [disabled]="page === 1">
                        <mat-icon>chevron_left</mat-icon>
                    </button>
                    <ng-container *ngFor="let p of visiblePages">
                        <button *ngIf="p !== '...'" class="page-btn" [class.active]="p === page"
                            (click)="goToPage(p)">{{p}}</button>
                        <span *ngIf="p === '...'" class="page-dots">...</span>
                    </ng-container>
                    <button class="page-btn" (click)="next(page)" [disabled]="page === totalPages || totalPages === 0">
                        <mat-icon>chevron_right</mat-icon>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<ng-template #noRecord>
    <div class="empty-state">
        <mat-icon>search_off</mat-icon>
        <h3>No Orders Found</h3>
        <p>We couldn't find any orders matching your criteria. Try adjusting your filters.</p>
    </div>
</ng-template>
