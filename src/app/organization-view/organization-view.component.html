<div class="org-view-container">
  <!-- Header Section -->
  <div class="org-header-card">
    <div class="header-left">
      <button mat-icon-button class="back-btn" (click)="goBack()">
        <mat-icon>arrow_back</mat-icon>
      </button>
      <div class="title-section">
        <h1 class="page-title">{{ organization?.organization_name || 'Organization Details' }}</h1>
        <p class="page-subtitle">Manage organization menus, employees & settings</p>
      </div>
    </div>
  </div>

  <!-- Tab Navigation -->
  <div class="tabs-container">
    <div class="main-tabs">
      <button *ngFor="let view of orgViewList; let i = index" class="tab-btn"
        [class.active]="selectedMainTabIndex === i" (click)="onMainTabChange(i)">
        <mat-icon class="tab-icon">{{ getTabIcon(view.path) }}</mat-icon>
        <span>{{ view.name }}</span>
      </button>
    </div>

    <!-- Sub Tabs -->
    <div class="sub-tabs-wrapper" *ngIf="selectedMain?.subTabs?.length">
      <div class="sub-tabs">
        <button *ngFor="let sub of selectedMain.subTabs; let i = index" class="sub-tab-btn"
          [class.active]="selectedSubTabIndex === i" (click)="onSubTabChange(i)">
          {{ sub.name }}
        </button>
      </div>
    </div>

    <!-- Child Tabs -->
    <div class="child-tabs-wrapper" *ngIf="selectedSub?.childTabs?.length">
      <div class="child-tabs">
        <button *ngFor="let child of selectedSub.childTabs; let i = index" class="child-tab-btn"
          [class.active]="selectedChildTabIndex === i" (click)="selectedChildTabIndex = i">
          {{ child.name }}
        </button>
      </div>
    </div>
  </div>

  <!-- Tab Content -->
  <div class="tab-content">
    <!-- Main tabs without sub-tabs -->
    <ng-container *ngIf="!selectedMain?.subTabs?.length" [ngSwitch]="selectedMain?.path">
      <app-org-details *ngSwitchCase="'orgDetails'" [orgObj]="organization"></app-org-details>
      <app-mealawe-outlet *ngSwitchCase="'mealAweOutlet'" [orgObj]="organization"></app-mealawe-outlet>
      <app-daily-order-menu *ngSwitchCase="'dailyOrderMenu'" [orgObj]="organization"></app-daily-order-menu>
      <app-consumption-order *ngSwitchCase="'consumptionOrder'" [orgObj]="organization"></app-consumption-order>
      <app-employee-list *ngSwitchCase="'employeeList'" [orgObj]="organization"></app-employee-list>
      <app-outlet-employee *ngSwitchCase="'outletEmployee'" [orgObj]="organization"></app-outlet-employee>
      <app-vc-employee *ngSwitchCase="'vcEmployee'" [orgObj]="organization"></app-vc-employee>
      <app-guest-employee-list *ngSwitchCase="'guestEmployeeList'" [orgObj]="organization"></app-guest-employee-list>
      <app-organization-compliance *ngSwitchCase="'organizationCompliance'"
        [OrgObj]="organization"></app-organization-compliance>
      <app-employee-wallet *ngSwitchCase="'employeeWallet'" [orgObj]="organization"></app-employee-wallet>
      <app-qr-employee *ngSwitchCase="'qrEmployee'" [orgObj]="organization"></app-qr-employee>
    </ng-container>

    <!-- Sub tabs without child tabs -->
    <ng-container *ngIf="selectedMain?.subTabs?.length && !selectedSub?.childTabs?.length"
      [ngSwitch]="selectedSub?.path">
      <app-cake-menu *ngSwitchCase="'cakeMenu'" [orgObj]="organization"></app-cake-menu>
      <app-sweet-menu *ngSwitchCase="'sweetMenu'" [orgObj]="organization"></app-sweet-menu>
      <app-lux-menu *ngSwitchCase="'luxMenu'" [orgObj]="organization"></app-lux-menu>
    </ng-container>

    <!-- Child tabs content -->
    <ng-container *ngIf="selectedSub?.childTabs?.length" [ngSwitch]="selectedChild?.path">
      <app-org-bulk-menu *ngSwitchCase="'bulkMealsMenu'" [orgObj]="organization"></app-org-bulk-menu>
      <app-org-individual-menu *ngSwitchCase="'individualMealsMenu'" [orgObj]="organization"></app-org-individual-menu>
      <app-org-bulk-snackbox-menu *ngSwitchCase="'bulkSnacksMenu'" [orgObj]="organization"></app-org-bulk-snackbox-menu>
      <app-org-individual-snackbox-menu *ngSwitchCase="'individualSnacksMenu'"
        [orgObj]="organization"></app-org-individual-snackbox-menu>
      <app-org-predefined-snackbox-menu *ngSwitchCase="'predefinedSnackBoxMenu'"
        [orgObj]="organization"></app-org-predefined-snackbox-menu>
      <app-org-customized-snackbox-menu *ngSwitchCase="'customizedSnackBoxMenu'"
        [orgObj]="organization"></app-org-customized-snackbox-menu>
    </ng-container>
  </div>
</div>
