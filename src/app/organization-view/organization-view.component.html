 <div class="left_arrow" style="cursor: pointer">
    <i class="bi bi-arrow-left"></i>
    Back
  </div>

<div class="row bg-light rounded py-4 my-3">
  <div
    class="col-4 col-md-3 col-lg-2 bgpadding1"
    *ngFor="let view of orgViewList"
    [ngClass]="{ tileSelected: selectedTab === view.path }"
    (click)="gotToTab(view.path)"
  >
    <div class="tileLabel header4 countTile">
      {{ view.name }}
    </div>
  </div>
</div>

<div class="row" *ngIf="getSubTab().length">
  <div
    class="col-4 col-md-3 col-lg-2 bgpadding1"
    *ngFor="let sub of getSubTab()"
    [ngClass]="{ tileSelected: selectedSubTab === sub.path }"
    (click)="goToSubTab(sub.path)"
  >
    <div class="tileLabel header4 countTile">
      {{ sub.name }}
    </div>
  </div>
</div>

<!-- Main‐Tab Content -->
<div *ngIf="selectedTab === 'orgDetails'">
  <app-org-details [orgObj]="organization"></app-org-details>
</div>
<div *ngIf="selectedTab === 'guestEmployeeList'">

</div>
