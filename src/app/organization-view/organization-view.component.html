<!-- Back Button -->
<div class="left_arrow" (click)="goBack()" style="cursor: pointer">
  <i class="bi bi-arrow-left"></i> Back
</div>

<!-- Main Tabs -->
<div class="row bg-light rounded py-4 my-3">
  <div class="col-4 col-md-3 col-lg-2 bgpadding1" *ngFor="let view of orgViewList"
    [ngClass]="{ tileSelected: selectedTab === view.path }" (click)="gotToTab(view.path)">
    <div class="tileLabel header4 countTile">{{ view.name }}</div>
  </div>
</div>

<!-- Sub Tabs -->
<div class="row" *ngIf="getSubTab().length">
  <div class="col-4 col-md-3 col-lg-2 bgpadding1" *ngFor="let sub of getSubTab()"
    [ngClass]="{ tileSelected: selectedSubTab === sub.path || selectedSubTab === sub.name }"
    (click)="goToSubTab(sub.path || sub.name)">
    <div class="tileLabel header4 countTile">{{ sub.name }}</div>
  </div>
</div>

<!-- Child Tabs -->
<div class="row" *ngIf="getChildTabs().length">
  <div class="col-4 col-md-3 col-lg-2 bgpadding1" *ngFor="let child of getChildTabs()"
    [ngClass]="{ tileSelected: selectedChildTab === child.path }" (click)="selectedChildTab = child.path">
    <div class="tileLabel header4 countTile">{{ child.name }}</div>
  </div>
</div>

<!-- Main Content Tabs -->
<ng-container [ngSwitch]="selectedTab">
  <app-org-details *ngSwitchCase="'orgDetails'" [orgObj]="organization"></app-org-details>
  <app-guest-employee-list *ngSwitchCase="'guestEmployeeList'" [orgObj]="organization"></app-guest-employee-list>
  <app-meal-awe-outlet *ngSwitchCase="'mealAweOutlet'" [orgObj]="organization"></app-meal-awe-outlet>
  <app-b2b-weekly-menu *ngSwitchCase="'b2bWeeklyMenu'" [orgObj]="organization"></app-b2b-weekly-menu>
  <app-organization-compliance *ngSwitchCase="'organizationCompliance'"
    [OrgObj]="organization"></app-organization-compliance>
  <app-employee-list *ngSwitchCase="'employeeList'" [orgObj]="organization"></app-employee-list>
  <app-outlet-employee *ngSwitchCase="'outletEmployee'" [orgObj]="organization"></app-outlet-employee>
  <app-vc-employee *ngSwitchCase="'vcEmployee'" [orgObj]="organization"></app-vc-employee>
</ng-container>

<ng-container [ngSwitch]="selectedSubTab">
  <app-cake-menu *ngSwitchCase="'cakeMenu'" [orgObj]="organization">Cake Menu</app-cake-menu>
  <app-sweet-menu *ngSwitchCase="'sweetMenu'" [orgObj]="organization">Sweet Menu</app-sweet-menu>
  <app-lux-menu *ngSwitchCase="'luxMenu'" [orgObj]="organization">Lux Menu</app-lux-menu>
</ng-container>

<hr *ngIf="selectedChildTab">

<ng-container [ngSwitch]="selectedChildTab">
  <app-org-bulk-menu *ngSwitchCase="'bulkMealsMenu'" [orgObj]="organization"></app-org-bulk-menu>
  <app-org-individual-menu *ngSwitchCase="'individualMealsMenu'" [orgObj]="organization"></app-org-individual-menu>
  <app-org-bulk-snackbox-menu *ngSwitchCase="'bulkSnacksMenu'" [orgObj]="organization"></app-org-bulk-snackbox-menu>
  <app-org-individual-snackbox-menu *ngSwitchCase="'individualSnacksMenu'"
    [orgObj]="organization"></app-org-individual-snackbox-menu>
  <app-org-predefined-snackbox-menu *ngSwitchCase="'predefinedSnackBoxMenu'"
    [orgObj]="organization"></app-org-predefined-snackbox-menu>
  <app-org-customized-snackbox-menu *ngSwitchCase="'customizedSnackBoxMenu'"
    [orgObj]="organization"></app-org-customized-snackbox-menu>
</ng-container>
