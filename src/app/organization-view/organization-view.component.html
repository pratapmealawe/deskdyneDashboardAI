<div class="add-vendor d-flex align-items-center pb-4 gap-3">
  <button mat-flat-button (click)="goBack()"><mat-icon>arrow_back</mat-icon>Back</button>
  <div class="heading">View Organization</div>
</div>
<mat-tab-group [(selectedIndex)]="selectedMainTabIndex" (selectedIndexChange)="onMainTabChange($event)"
  class="custom-tabs">
  <mat-tab *ngFor="let view of orgViewList; let mainIndex = index" [label]="view.name">
    <ng-container *ngIf="selectedMainTabIndex === mainIndex">
      <!-- Common Header for Bulk Menu Section - Placed above tabs -->
      <div *ngIf="showBulkMenuHeader && organization?.cafeteriaList?.length > 0" class="mb-4">
        <mat-card class="p-3">
          <mat-card-title>Select Cafeteria</mat-card-title>
          <mat-radio-group color="primary" [(ngModel)]="selectedCafeteria">
            <mat-radio-button *ngFor="let cafeteria of organization.cafeteriaList" [id]="cafeteria._id"
              name="CafeteriaName" [value]="cafeteria" (change)="onCafeteriaChange($event)">
              {{cafeteria.cafeteria_name}}
            </mat-radio-button>
          </mat-radio-group>
          <div class="d-flex justify-content-end align-items-center gap-2 mt-2">
            <button mat-raised-button color="primary" *ngIf="!isVendorAssigned" (click)="assignVendor()">
              <mat-icon>add</mat-icon>
              Assign Vendor
            </button>
            <button mat-raised-button color="primary" *ngIf="isVendorAssigned" (click)="changeVendor()">
              <mat-icon>edit</mat-icon>
              Change Vendor
            </button>
            <button mat-raised-button color="primary" (click)="copyMenu()">
              <mat-icon>content_copy</mat-icon>
              Copy Menu
            </button>
            <button mat-raised-button color="primary" (click)="exportMenu()">
              <mat-icon>cloud_download</mat-icon>
              Download Menu
            </button>
          </div>
        </mat-card>
      </div>
      <mat-tab-group *ngIf="view.subTabs?.length" [(selectedIndex)]="selectedSubTabIndex"
        (selectedIndexChange)="onSubTabChange($event)" class="custom-tabs">
        <mat-tab *ngFor="let sub of view.subTabs; let subIndex = index" [label]="sub.name">
          <ng-container *ngIf="selectedSubTabIndex === subIndex">
            <mat-tab-group *ngIf="sub.childTabs?.length" [(selectedIndex)]="selectedChildTabIndex" (selectedIndexChange)="onChildTabChange($event)" class="custom-tabs">
              <mat-tab *ngFor="let child of sub.childTabs; let childIndex = index" [label]="child.name">
                <ng-container *ngIf="selectedChildTabIndex === childIndex" [ngSwitch]="child.path">
                  <app-org-bulk-menu *ngSwitchCase="'bulkMealsMenu'" [orgObj]="organization" [selectedCafeteria]="selectedCafeteria" (isVendorAssigned)="checkVendorAssigned($event)"></app-org-bulk-menu>
                  <app-org-individual-menu *ngSwitchCase="'individualMealsMenu'"
                    [orgObj]="organization" [selectedCafeteria]="selectedCafeteria" (isVendorAssigned)="checkVendorAssigned($event)"></app-org-individual-menu>
                  <app-org-bulk-snackbox-menu *ngSwitchCase="'bulkSnacksMenu'"
                    [orgObj]="organization" [selectedCafeteria]="selectedCafeteria" (isVendorAssigned)="checkVendorAssigned($event)"></app-org-bulk-snackbox-menu>
                  <app-org-individual-snackbox-menu *ngSwitchCase="'individualSnacksMenu'"
                    [orgObj]="organization" [selectedCafeteria]="selectedCafeteria" (isVendorAssigned)="checkVendorAssigned($event)"></app-org-individual-snackbox-menu>
                  <app-org-predefined-snackbox-menu *ngSwitchCase="'predefinedSnackBoxMenu'"
                    [orgObj]="organization" [selectedCafeteria]="selectedCafeteria" (isVendorAssigned)="checkVendorAssigned($event)"></app-org-predefined-snackbox-menu>
                  <app-org-customized-snackbox-menu *ngSwitchCase="'customizedSnackBoxMenu'"
                    [orgObj]="organization" [selectedCafeteria]="selectedCafeteria" (isVendorAssigned)="checkVendorAssigned($event)"></app-org-customized-snackbox-menu>
                </ng-container>
              </mat-tab>
            </mat-tab-group>
            <ng-container *ngIf="!sub.childTabs?.length" [ngSwitch]="sub.path">
              <app-cake-menu *ngSwitchCase="'cakeMenu'" [orgObj]="organization" [selectedCafeteria]="selectedCafeteria" (isVendorAssigned)="checkVendorAssigned($event)"></app-cake-menu>
              <app-sweet-menu *ngSwitchCase="'sweetMenu'" [orgObj]="organization" [selectedCafeteria]="selectedCafeteria" (isVendorAssigned)="checkVendorAssigned($event)"></app-sweet-menu>
              <app-lux-menu *ngSwitchCase="'luxMenu'" [orgObj]="organization" [selectedCafeteria]="selectedCafeteria" (isVendorAssigned)="checkVendorAssigned($event)"></app-lux-menu>
            </ng-container>
          </ng-container>
        </mat-tab>
      </mat-tab-group>
      <ng-container *ngIf="!view.subTabs?.length" [ngSwitch]="view.path">
        <app-org-details *ngSwitchCase="'orgDetails'" [orgObj]="organization"></app-org-details>
        <app-mealawe-outlet *ngSwitchCase="'mealAweOutlet'" [orgObj]="organization"></app-mealawe-outlet>
        <app-daily-order-menu *ngSwitchCase="'dailyOrderMenu'" [orgObj]="organization"></app-daily-order-menu>
        <app-consumption-order *ngSwitchCase="'consumptionOrder'" [orgObj]="organization"></app-consumption-order>
        <app-employee-list *ngSwitchCase="'employeeList'" [orgObj]="organization"></app-employee-list>
        <app-outlet-employee *ngSwitchCase="'outletEmployee'" [orgObj]="organization"></app-outlet-employee>
        <app-vc-employee *ngSwitchCase="'vcEmployee'" [orgObj]="organization"></app-vc-employee>
        <app-guest-employee-list *ngSwitchCase="'guestEmployeeList'" [orgObj]="organization"></app-guest-employee-list>
        <app-organization-compliance *ngSwitchCase="'organizationCompliance'"
          [OrgObj]="organization"></app-organization-compliance>
        <app-employee-wallet *ngSwitchCase="'employeeWallet'" [orgObj]="organization"></app-employee-wallet>
        <app-qr-employee *ngSwitchCase="'qrEmployee'" [orgObj]="organization"></app-qr-employee>
      </ng-container>
    </ng-container>
  </mat-tab>
</mat-tab-group>
