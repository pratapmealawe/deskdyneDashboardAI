<div class="table-responsive">
  <table mat-table [dataSource]="dataSource" matSort class="mat-elevation-z8 w-100">
    <ng-container matColumnDef="Organization Name">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Org Name</th>
      <td mat-cell *matCellDef="let org">{{ org.organization_name }}</td>
    </ng-container>
    <ng-container matColumnDef="Location">
      <th mat-header-cell *matHeaderCellDef>Location</th>
      <td mat-cell *matCellDef="let org">{{ org.location }}</td>
    </ng-container>
    <ng-container matColumnDef="Poc Details">
      <th mat-header-cell *matHeaderCellDef>Poc Details</th>
      <td mat-cell *matCellDef="let org"><mat-chip (click)="dataView(org.poc_details,'poc')" class="custom-chip">poc
          details | {{org.poc_details.length}}</mat-chip></td>
    </ng-container>
    <ng-container matColumnDef="Cafeteria">
      <th mat-header-cell *matHeaderCellDef>Cafeteria</th>
      <td mat-cell *matCellDef="let org"><mat-chip (click)="dataView(org.cafeteriaList , 'cafeteria')"
          class="custom-chip">Cafeteria | {{org.cafeteriaList.length}}</mat-chip></td>
    </ng-container>
    <ng-container matColumnDef="action" stickyEnd>
      <th mat-header-cell *matHeaderCellDef class="text-center">Action</th>
      <td mat-cell *matCellDef="let org" class="text-center">
        <button mat-icon-button color="primary" (click)="vieworg(org)" matTooltip="View">
          <mat-icon>visibility</mat-icon>
        </button>
      </td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="displayedColumns" class="table-header"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="table-row"></tr>
  </table>
  <div *ngIf="dataSource.data.length === 0" class="text-center py-5 text-secondary">
    <mat-icon style="font-size: 48px; opacity: 0.5;">inbox</mat-icon>
    <p class="mb-0 mt-2">No records available</p>
  </div>
</div>
<mat-paginator [length]="totalRecords" [pageSize]="pageSize" [pageIndex]="pageIndex" [pageSizeOptions]="pageSizeOptions"
  (page)="onPageChange($event)" aria-label="Select page">
</mat-paginator>

<div class="custom-backdrop" *ngIf="showModal" (click)="closeModal()"></div>
<div class="custom-modal " *ngIf="showModal">
  <div class="custom-modal-header d-flex justify-content-between align-items-center">
    <h3>{{tableDetails}}</h3>
    <button class="close-btn" (click)="closeModal()">✖</button>
  </div>

  <div class="custom-modal-body">
    <table mat-table [dataSource]="tableData" matSort class="mat-elevation-z8 w-100 table">
      <ng-container [matColumnDef]="col" *ngFor="let col of columns" >
        <th mat-header-cell *matHeaderCellDef >
          {{ col | titlecase}}
        </th>
        <td mat-cell *matCellDef="let row">
        <mat-chip *ngIf="row[col] === true" color="primary" selected class="yes-chip">
           Yes
        </mat-chip>
        <mat-chip *ngIf="row[col] === false" color="warn" selected class="no-chip">
           No
        </mat-chip>
        <span *ngIf="row[col] !== true && row[col] !== false">
           {{ row[col] }}
        </span>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="columns" class="table-header"></tr>
      <tr mat-row *matRowDef="let row; columns: columns;" class="table-row"></tr>
    </table>
  </div>
</div>
