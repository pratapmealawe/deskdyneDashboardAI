<div class="row card-wrapper">
  <div class="col-lg-12 col-md-10 col-9">
    <div class="row">
      <div class="col-12 col-md-4 col-lg-12">
        <div class="row">
          <div class="col-6 col-md-5 col-lg-3">
            <div class="labelText">Org Name</div>
            <div class="labelData">{{ organization.organization_name }}</div>
          </div>
          <div class="col-6 col-md-7 col-lg-3">
            <div class="labelText">Location</div>
            <div class="labelData">{{ organization.location }}</div>
          </div>
          <div class="col-6 col-md-7 col-lg-5">
            <div class="labelText">City</div>
            <div class="labelData">{{ organization.city }}</div>
          </div>
          <div class="col-6 col-md-7 col-lg-1">
            <div
              class="inline right pointer header3"
              *ngIf="true || btnPolicy?.viewOrganization"
              (click)="vieworg(organization)"
            >
              <i class="bi bi-eye"></i>
            </div>
          </div>
        </div>
      </div>

      <div class="col-12 col-md-4 col-lg-12">
        <div class="row" *ngFor="let poc of organization.poc_details">
          <div class="col-6 col-md-5 col-lg-3">
            <div class="labelText">Name</div>
            <div class="labelData">{{ poc.poc_name }}</div>
          </div>
          <div class="col-6 col-md-7 col-lg-3">
            <div class="labelText">Email</div>
            <div class="labelData">{{ poc.poc_email }}</div>
          </div>
          <div class="col-6 col-md-7 col-lg-2">
            <div class="labelText">Phone No</div>
            <div class="labelData">{{ poc.poc_phoneNo }}</div>
          </div>
          <div class="col-6 col-md-7 col-lg-2">
            <div class="labelText">Location</div>
            <div class="labelData">{{ poc.poc_location }}</div>
          </div>
          <div class="col-6 col-md-7 col-lg-2">
            <div class="labelText">Role</div>
            <div class="labelData">{{ poc.poc_role }}</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
