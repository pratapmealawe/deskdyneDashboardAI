<div class="vendor-dialog-container">
    <!-- DIALOG HEADER (Modern Compact) -->
    <div class="modern-header mb-3">
        <div class="d-flex align-items-center gap-2">
            <div class="icon-box primary">
                <mat-icon>business</mat-icon>
            </div>
            <div>
                <h2 class="dialog-title mb-0">{{ data.vendorDetails ?'Edit' :'Assign' }} Vendor</h2>
                <p class="small text-muted mb-0">Select a vendor firm for this menu</p>
            </div>
        </div>
        <button mat-icon-button (click)="closeModal()" class="close-btn" aria-label="Close dialog">
            <mat-icon>close</mat-icon>
        </button>
    </div>

    <mat-dialog-content class="custom-content">
        <form [formGroup]="vendorForm">
            <div class="row g-3">
                <div class="col-12">
                    <div class="field-label mb-2">Vendor Firm</div>
                    <mat-form-field appearance="outline" class="w-100">
                        <mat-select formControlName="vendorFirmId" (selectionChange)="onVendorFirmChange($event)" placeholder="Choose a firm">
                            <mat-option *ngFor="let vendorFirm of vendorFirmList"
                                [value]="vendorFirm.vendorFirmDetails.vendorFirmId">
                                {{ vendorFirm.vendorFirmDetails?.vendorFirmName }}
                            </mat-option>
                        </mat-select>
                        <mat-icon matPrefix>store</mat-icon>
                    </mat-form-field>
                </div>

                <div class="col-12 mt-4" *ngIf="vendorList.length > 0">
                    <div class="field-label mb-3">Select Vendor Person</div>
                    <mat-radio-group formControlName="vendorId" (change)="onVendorChange($event)"
                        class="vendor-radio-grid">
                        <mat-radio-button *ngFor="let vendor of vendorList" [value]="vendor._id" class="vendor-chip">
                            <div class="vendor-info">
                                <span class="name">{{ vendor.vendorName }}</span>
                                <span class="phone" *ngIf="vendor.phone">{{ vendor.phone }}</span>
                            </div>
                        </mat-radio-button>
                    </mat-radio-group>
                </div>
            </div>
        </form>
    </mat-dialog-content>

    <div class="dialog-actions-strip">
        <button mat-button (click)="closeModal()" class="btn-cancel">Cancel</button>
        <button mat-flat-button color="primary" [disabled]="vendorForm.invalid" (click)="saveChanges()" class="btn-save">
            <mat-icon>verified</mat-icon>
            Confirm Assignment
        </button>
    </div>
</div>
