<div mat-dialog-title>
    <div class="delivery-settings-modal premium-modal">
    <div class="modal-header">
        <div class="title-wrap">
            <div class="icon-box primary">
                <mat-icon>person_pin</mat-icon>
            </div>
            <div class="text">
                <h3>{{data.vendorDetails ?'Edit' :'Add'}} Vendor</h3>
                <p>Assign a vendor and vendor firm to this outlet</p>
            </div>
        </div>
        <button mat-icon-button (click)="closeModal()" class="close-btn">
            <mat-icon>close</mat-icon>
        </button>
    </div>

    <mat-dialog-content class="dialog-content">
        <form [formGroup]="vendorForm" class="p-3">
            <div class="form-grid-modern">
                <div class="row g-4 mt-1">
                    <div class="col-md-6">
                        <mat-form-field appearance="outline" class="w-100">
                            <mat-label>Vendor Firm Name</mat-label>
                            <mat-select (selectionChange)="onVendorFirmChange($event)" formControlName="vendorFirmId">
                                <mat-option *ngFor="let vendorFirm of vendorFirmList"
                                    [value]="vendorFirm.vendorFirmDetails.vendorFirmId">
                                    {{vendorFirm.vendorFirmDetails?.vendorFirmName}}
                                </mat-option>
                            </mat-select>
                            <mat-error *ngIf="vendorForm.get('vendorFirmId')?.hasError('required')">Required</mat-error>
                        </mat-form-field>
                    </div>
                    <div class="col-md-6">
                        <mat-form-field appearance="outline" class="w-100">
                            <mat-label>Vendor Name</mat-label>
                            <mat-select (selectionChange)="onVendorChange($event)" formControlName="vendorId">
                                <mat-option *ngFor="let vendor of vendorList" [value]="vendor._id">
                                    {{vendor.vendorName}}
                                </mat-option>
                            </mat-select>
                            <mat-error *ngIf="vendorForm.get('vendorId')?.hasError('required')">Required</mat-error>
                        </mat-form-field>
                    </div>
                </div>
            </div>
        </form>
    </mat-dialog-content>

    <mat-dialog-actions align="end" class="modal-footer px-4 py-3 bg-light-soft border-top">
        <button mat-button class="btn-cancel me-2" (click)="closeModal()">Cancel</button>
        <button mat-flat-button color="primary" class="btn-primary-action px-4" (click)="saveChanges()">
            <mat-icon>check_circle</mat-icon>
            <span>{{data.vendorDetails ?'Update' :'Save'}} Vendor</span>
        </button>
    </mat-dialog-actions>
</div>
