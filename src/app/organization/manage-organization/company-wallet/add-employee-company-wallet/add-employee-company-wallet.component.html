<div class="modal-header d-flex justify-content-between align-items-center p-3 border-bottom">
    <h2 mat-dialog-title class="m-0 fs-5 fw-bold">{{data.employee ? 'Edit' : 'Add'}} Employee</h2>
    <button mat-icon-button (click)="onCancel()" class="close-btn">
        <span class="material-icons">close</span>
    </button>
</div>

<form [formGroup]="employeeForm" (ngSubmit)="onSubmit()">
    <mat-dialog-content class="mat-typography p-4">
        <div class="row g-3">
            <!-- Employee Name -->
            <div class="col-12">
                <mat-form-field appearance="outline" class="w-100">
                    <mat-label>Employee Name</mat-label>
                    <input matInput formControlName="employeeName" placeholder="Ex. John Doe">
                    <mat-error *ngIf="employeeForm.get('employeeName')?.hasError('required')">
                        Name is required
                    </mat-error>
                </mat-form-field>
            </div>

            <!-- Employee ID -->
            <div class="col-md-6">
                <mat-form-field appearance="outline" class="w-100">
                    <mat-label>Employee ID</mat-label>
                    <input matInput formControlName="employeeId" placeholder="Ex. EMP123">
                    <mat-error *ngIf="employeeForm.get('employeeId')?.hasError('required')">
                        ID is required
                    </mat-error>
                </mat-form-field>
            </div>

            <!-- Phone Number -->
            <div class="col-md-6">
                <mat-form-field appearance="outline" class="w-100">
                    <mat-label>Phone Number</mat-label>
                    <input matInput type="number" formControlName="employeePhoneNo" placeholder="Ex. 9876543210">
                    <mat-error *ngIf="employeeForm.get('employeePhoneNo')?.hasError('required')">
                        Phone number is required
                    </mat-error>
                    <mat-error *ngIf="employeeForm.get('employeePhoneNo')?.hasError('pattern')">
                        Invalid phone number
                    </mat-error>
                </mat-form-field>
            </div>

            <!-- Email -->
            <div class="col-12">
                <mat-form-field appearance="outline" class="w-100">
                    <mat-label>Email Address</mat-label>
                    <input matInput formControlName="employeeEmail" placeholder="Ex. john@example.com">
                    <mat-error *ngIf="employeeForm.get('employeeEmail')?.hasError('required')">
                        Email is required
                    </mat-error>
                    <mat-error *ngIf="employeeForm.get('employeeEmail')?.hasError('email')">
                        Invalid email address
                    </mat-error>
                </mat-form-field>
            </div>


        </div>
    </mat-dialog-content>

    <mat-dialog-actions align="end" class="p-3 border-top gap-2">
        <button mat-button type="button" (click)="onCancel()" class="text-secondary">Cancel</button>
        <button mat-raised-button color="primary" type="submit" [disabled]="employeeForm.invalid">
            {{data.employee ? 'Update' : 'Save'}} Employee
        </button>
    </mat-dialog-actions>
</form>
