<div class="container-fluid pe-4 ps-4">
  <div class="d-flex flex-column flex-sm-row align-items-center justify-content-between" *ngIf="showSearchSection">
    <div class="g-0">
      <h4 class="m-0 fw-semibold">Organization</h4>
    </div>
    <div class="d-flex justify-content-end align-items-center gap-3">
      <div class="input-group" class="text-nowrap d-none d-md-inline-flex">
        <mat-form-field appearance="outline" class="search-input">
          <input matInput type="text" placeholder="Search organization..." [formControl]="searchControl" />
          <button mat-icon-button matSuffix aria-label="Search" class="search-icon">
            <mat-icon>search</mat-icon> </button>
        </mat-form-field>
      </div>
      <button mat-raised-button color="primary" class="text-nowrap d-none d-md-inline-flex" (click)="addOrg()">
        Add Organization
      </button>
      <button mat-icon-button color="primary" class="d-inline-flex d-md-none" (click)="addOrg()" matTooltip="Add Vendor"
        aria-label="Add Vendor">
        <mat-icon>add_circle</mat-icon>
      </button>
    </div>
    <div class="d-inline-flex d-md-none w-100">
      <mat-form-field appearance="outline" class="search-input w-100">
        <input matInput type="text" placeholder="Search organization..." [formControl]="searchControl" />
        <button mat-icon-button matSuffix aria-label="Search" class="search-icon">
          <mat-icon>search</mat-icon> </button>
      </mat-form-field>
    </div>
  </div>
  <ng-container *ngIf="showSearchSection; else viewSection">
    <div *ngIf="orgList?.length > 0; else noRecords">
      <div>
        <app-organization-card [organization]="orgList" (view)="viewOrg($event)"
          (paginationConfig)="paginationConfig($event)">
        </app-organization-card>
      </div>
    </div>
  </ng-container>
  <ng-template #viewSection>
    <div class="bgsidepadding1" *ngIf="selectedOrg; else noRecords">
      <app-organization-view [organization]="selectedOrg" (back)="toggleShowOrder($event)">
      </app-organization-view>
    </div>
  </ng-template>
  <ng-template #noRecords>
    <div class="center mt-5">No Records Found</div>
  </ng-template>
</div>
