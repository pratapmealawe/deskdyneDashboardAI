<div class="container-fluid py-4 dashboard-main-container">

  <!-- Page Header Card -->
  <div class="page-header-card mb-4">
    <div class="header-content">
      <div class="title-section">
        <h1 class="page-title">Dashboard</h1>
        <p class="page-subtitle">Manage your organization's performance and operations</p>
      </div>

      <div class="actions-section">
        <mat-form-field appearance="outline" class="org-selector">
          <mat-label>Select Organization</mat-label>
          <mat-select (selectionChange)="changeOrganization($event)" [value]="orgSelected?._id">
            <mat-option *ngFor="let org of orglist" [value]="org._id">
              {{org?.organization_name}}
            </mat-option>
          </mat-select>
        </mat-form-field>
      </div>
    </div>
  </div>

  <!-- Loading State -->
  <div class="loading-state" *ngIf="isLoading">
    <mat-spinner diameter="44"></mat-spinner>
    <p>Loading organizations...</p>
  </div>

  <!-- Content Area -->
  <div *ngIf="!isLoading && orgSelected">
    <!-- Main Tabs (pill-style) -->
    <div class="tabs-container">
      <div class="main-tabs">
        <button *ngFor="let tab of tabs" class="tab-btn" [class.active]="selectedIndex === tab.index"
          (click)="onTabChange(tab.index)">
          <mat-icon class="tab-icon">{{ tab.icon }}</mat-icon>
          <span>{{ tab.name }}</span>
        </button>
      </div>
    </div>

    <!-- Tab Content -->
    <div class="tab-content-area py-2">
      <div [ngSwitch]="selectedIndex">
        <app-org-dashboard *ngSwitchCase="0" [adminOrg]="orgSelected"
          [isOrgSelected]="isOrgSelected"></app-org-dashboard>
        <app-other-orders *ngSwitchCase="1"></app-other-orders>
        <app-org-menu-items *ngSwitchCase="2" [adminOrg]="orgSelected"></app-org-menu-items>
        <app-org-orders *ngSwitchCase="3" [adminOrg]="orgSelected"></app-org-orders>
        <app-org-reviews *ngSwitchCase="4" [adminOrg]="orgSelected"></app-org-reviews>
        <app-customer *ngSwitchCase="5" [adminOrg]="orgSelected"></app-customer>
        <app-org-vendor-info *ngSwitchCase="6" [adminOrg]="orgSelected"></app-org-vendor-info>
        <app-org-menu-counters *ngSwitchCase="7" [adminOrg]="orgSelected"></app-org-menu-counters>
        <app-audit-report *ngSwitchCase="8" [adminOrg]="orgSelected"></app-audit-report>
      </div>
    </div>
  </div>

  <!-- Empty State -->
  <div class="empty-state" *ngIf="!isLoading && !orgSelected">
    <mat-icon>business</mat-icon>
    <h3>No Organization Selected</h3>
    <p>Please select an organization from the selector above to view the dashboard.</p>
  </div>
</div>
