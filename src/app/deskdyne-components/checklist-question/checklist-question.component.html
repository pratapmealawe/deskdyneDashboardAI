<div class="container">
  <div class="row">
    <div class="col-lg-12 d-flex align-items-center justify-content-between">
      <h3>View Checklist</h3>
      <span
        class="addBtn"
        *ngIf="btnPolicy?.addChecklist"
        (click)="addQuestion()"
        ><i class="bi bi-plus"></i
      ></span>
    </div>
  </div>

  <div *ngIf="editMode" class="row mt-3">
    <div class="col-lg-12 mb-1">
      <div class="labelText" *ngIf="addnewQuestion">Add Checklist Question</div>
      <div class="labelText" *ngIf="!addnewQuestion">
        Update Checklist Question
      </div>
    </div>
    <div class="col-lg-12">
      <!-- <label class="labelData">Checklist Question</label> -->

      <input
        type="text"
        placeholder="Question"
        class="w-100 form-control"
        [(ngModel)]="QuestionObj.checklistQuestion"
      />
    </div>
    <div class="mt-3">
      <div class="inline" *ngIf="addnewQuestion && btnPolicy?.addChecklist">
        <button
          type="button"
          class="btn btn-primary btn-sm me-2"
          (click)="submitnewQuestion(QuestionObj)"
        >
          Submit
        </button>
      </div>
      <div class="inline" *ngIf="!addnewQuestion && btnPolicy?.editChecklist">
        <button
          type="button"
          class="btn btn-primary btn-sm me-2"
          (click)="updateChecklistQuestions(QuestionObj)"
        >
          Update
        </button>
      </div>
      <div class="inline">
        <button
          type="button"
          class="btn btn-danger btn-sm me-2"
          (click)="cancel()"
        >
          Cancel
        </button>
      </div>
    </div>
  </div>

  <div *ngIf="!editMode" class="mt-3">
    <div *ngFor="let Question of allChecklistQuestions" class="cardDesign mb-2">
      <div class="row">
        <div class="col-10 col-md-10 col-lg-10 labelData">
          {{ Question.checklistQuestion }}
        </div>
        <div class="col-3 col-md-2 col-lg-2 alignRight">
          <i
            *ngIf="btnPolicy?.editChecklist"
            class="bi bi-pencil-square bgsidepadding5 pointer"
            (click)="editQuestion(Question)"
          ></i>
          <i
            *ngIf="btnPolicy?.deleteChecklist"
            class="bi bi-trash-fill bgsidepadding5 pointer"
            (click)="showPopup(Question)"
          ></i>
        </div>
      </div>
    </div>
  </div>

  <div class="center" *ngIf="!editMode && allChecklistQuestions.length === 0">
    No Records Found
  </div>
</div>
