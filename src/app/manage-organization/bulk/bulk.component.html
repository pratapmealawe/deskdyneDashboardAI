<app-employee-select-cafeteria [organization]="orgObj"
    [selectedMainTabIndex]="selectedMainTabIndex" [selectedSubTabIndex]="selectedSubTabIndex"
    [selectedChildTabIndex]="selectedChildTabIndex" [isMenuAvailable]="isMenuAvailable"
    (cafeteriaChanged)="onCafeteriaChanged($event)" (isVendorAssigned)="checkVendorAssigned($event)"
    (isCategoryActive)="onCategoryActiveChanged($event)">
</app-employee-select-cafeteria>
<!-- SUB TABS NAVIGATION -->
<div class="sub-tabs-container mb-3" *ngIf="selectedMain?.subTabs?.length">
    <div class="sub-tabs">
        <button *ngFor="let sub of selectedMain.subTabs; let i = index" 
                class="sub-tab-btn"
                [class.active]="selectedSubTabIndex === i"
                (click)="onSubTabChange(i)">
            {{ sub.name }}
        </button>
    </div>
</div>

<!-- CHILD TABS NAVIGATION -->
<div class="child-tabs-container mb-3" *ngIf="selectedSub?.childTabs?.length">
    <div class="child-tabs">
        <button *ngFor="let child of selectedSub.childTabs; let i = index" 
                class="child-tab-btn"
                [class.active]="selectedChildTabIndex === i"
                (click)="onChildTabChange(i)">
            {{ child.name }}
        </button>
    </div>
</div>

<!-- SUB TABS WITHOUT CHILD -->
<ng-container *ngIf="selectedMain?.subTabs?.length && !selectedSub?.childTabs?.length" [ngSwitch]="selectedSub?.path">
    <!-- ORG MENUS -->
    <app-cake-menu *ngSwitchCase="'cakeMenu'" [orgObj]="orgObj" [selectedCafeteria]="selectedCafeteria"
        (hasMenu)="onMenuAvailabilityChange($event)" (isVendorAssigned)="checkVendorAssigned($event)">
    </app-cake-menu>

    <app-sweet-menu *ngSwitchCase="'sweetMenu'" [orgObj]="orgObj" [selectedCafeteria]="selectedCafeteria"
        (hasMenu)="onMenuAvailabilityChange($event)" (isVendorAssigned)="checkVendorAssigned($event)">
    </app-sweet-menu>

    <app-lux-menu *ngSwitchCase="'luxMenu'" [orgObj]="orgObj" [selectedCafeteria]="selectedCafeteria"
        (hasMenu)="onMenuAvailabilityChange($event)" (isVendorAssigned)="checkVendorAssigned($event)">
    </app-lux-menu>

    <app-pantry-menu *ngSwitchCase="'pantryMenu'" [orgObj]="orgObj" [selectedCafeteria]="selectedCafeteria"
        (hasMenu)="onMenuAvailabilityChange($event)" (isVendorAssigned)="checkVendorAssigned($event)">
    </app-pantry-menu>

    <!-- EMPLOYEE MENUS -->
    <app-employee-cake-menu *ngSwitchCase="'employeecakeMenu'" [orgObj]="orgObj"
        [selectedCafeteria]="selectedCafeteria" (hasMenu)="onMenuAvailabilityChange($event)"
        (isVendorAssigned)="checkVendorAssigned($event)">
    </app-employee-cake-menu>

    <app-employee-sweet-menu *ngSwitchCase="'employeesweetMenu'" [orgObj]="orgObj"
        [selectedCafeteria]="selectedCafeteria" (hasMenu)="onMenuAvailabilityChange($event)"
        (isVendorAssigned)="checkVendorAssigned($event)">
    </app-employee-sweet-menu>

    <app-employee-lux-menu *ngSwitchCase="'employeeluxMenu'" [orgObj]="orgObj"
        [selectedCafeteria]="selectedCafeteria" (hasMenu)="onMenuAvailabilityChange($event)"
        (isVendorAssigned)="checkVendorAssigned($event)">
    </app-employee-lux-menu>

    <app-employee-pantry-menu *ngSwitchCase="'employeepantryMenu'" [orgObj]="orgObj"
        [selectedCafeteria]="selectedCafeteria" (hasMenu)="onMenuAvailabilityChange($event)"
        (isVendorAssigned)="checkVendorAssigned($event)">
    </app-employee-pantry-menu>
</ng-container>

<!-- CHILD TAB CONTENT -->
<ng-container *ngIf="selectedSub?.childTabs?.length" [ngSwitch]="selectedChild?.path">
    <!-- ORG BULK -->
    <app-org-bulk-menu *ngSwitchCase="'bulkMealsMenu'" [orgObj]="orgObj" [selectedCafeteria]="selectedCafeteria"
        (hasMenu)="onMenuAvailabilityChange($event)" (isVendorAssigned)="checkVendorAssigned($event)">
    </app-org-bulk-menu>

    <app-org-individual-menu *ngSwitchCase="'individualMealsMenu'" [orgObj]="orgObj"
        [selectedCafeteria]="selectedCafeteria" (hasMenu)="onMenuAvailabilityChange($event)"
        (isVendorAssigned)="checkVendorAssigned($event)">
    </app-org-individual-menu>

    <app-org-bulk-snackbox-menu *ngSwitchCase="'bulkSnacksMenu'" [orgObj]="orgObj"
        [selectedCafeteria]="selectedCafeteria" (hasMenu)="onMenuAvailabilityChange($event)"
        (isVendorAssigned)="checkVendorAssigned($event)">
    </app-org-bulk-snackbox-menu>

    <app-org-individual-snackbox-menu *ngSwitchCase="'individualSnacksMenu'" [orgObj]="orgObj"
        [selectedCafeteria]="selectedCafeteria" (hasMenu)="onMenuAvailabilityChange($event)"
        (isVendorAssigned)="checkVendorAssigned($event)">
    </app-org-individual-snackbox-menu>

    <app-org-predefined-snackbox-menu *ngSwitchCase="'predefinedSnackBoxMenu'" [orgObj]="orgObj"
        [selectedCafeteria]="selectedCafeteria" (hasMenu)="onMenuAvailabilityChange($event)"
        (isVendorAssigned)="checkVendorAssigned($event)">
    </app-org-predefined-snackbox-menu>

    <app-org-customized-snackbox-menu *ngSwitchCase="'customizedSnackBoxMenu'" [orgObj]="orgObj"
        [selectedCafeteria]="selectedCafeteria" (hasMenu)="onMenuAvailabilityChange($event)"
        (isVendorAssigned)="checkVendorAssigned($event)">
    </app-org-customized-snackbox-menu>

    <!-- EMPLOYEE BULK -->
    <app-employee-bulk-meal-menu *ngSwitchCase="'employeebulkMealsMenu'" [orgObj]="orgObj"
        [selectedCafeteria]="selectedCafeteria" (hasMenu)="onMenuAvailabilityChange($event)"
        (isVendorAssigned)="checkVendorAssigned($event)">
    </app-employee-bulk-meal-menu>

    <app-employee-individual-meal-menu *ngSwitchCase="'employeeindividualMealsMenu'" [orgObj]="orgObj"
        [selectedCafeteria]="selectedCafeteria" (hasMenu)="onMenuAvailabilityChange($event)"
        (isVendorAssigned)="checkVendorAssigned($event)">
    </app-employee-individual-meal-menu>

    <app-employee-bulk-snack-menu *ngSwitchCase="'employeebulkSnacksMenu'" [orgObj]="orgObj"
        [selectedCafeteria]="selectedCafeteria" (hasMenu)="onMenuAvailabilityChange($event)"
        (isVendorAssigned)="checkVendorAssigned($event)">
    </app-employee-bulk-snack-menu>

    <app-employee-individual-snack-menu *ngSwitchCase="'employeeindividualSnacksMenu'" [orgObj]="orgObj"
        [selectedCafeteria]="selectedCafeteria" (hasMenu)="onMenuAvailabilityChange($event)"
        (isVendorAssigned)="checkVendorAssigned($event)">
    </app-employee-individual-snack-menu>

    <app-employee-predefined-foodbox-menu *ngSwitchCase="'employeepredefinedSnackBoxMenu'" [orgObj]="orgObj"
        [selectedCafeteria]="selectedCafeteria" (hasMenu)="onMenuAvailabilityChange($event)"
        (isVendorAssigned)="checkVendorAssigned($event)">
    </app-employee-predefined-foodbox-menu>

    <app-employee-customized-foodbox-menu *ngSwitchCase="'employeecustomizedSnackBoxMenu'" [orgObj]="orgObj"
        [selectedCafeteria]="selectedCafeteria" (hasMenu)="onMenuAvailabilityChange($event)"
        (isVendorAssigned)="checkVendorAssigned($event)">
    </app-employee-customized-foodbox-menu>

</ng-container>
