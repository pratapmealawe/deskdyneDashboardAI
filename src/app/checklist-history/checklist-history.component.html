<div class="container">
  <h3>CheckList History</h3>
  <div class="container">
    <div class="row mb-4 mt-3 p-3 bg-light rounded">
      <!-- Organization Selection -->
      <div class="col-12 col-md-3">
        <label for="organization" class="labelText d-block">Organization</label>
        <select
          class="form-select"
          [(ngModel)]="filterObj.orgId"
          [disabled]="this.orgAdmin.role === 'ORGADMIN'"
          (change)="setOrgDetails()"
        >
          <option selected disabled value="">Select Organization</option>
          <option *ngFor="let option of orglist" [value]="option._id">
            {{ option.organization_name }}
          </option>
        </select>
      </div>

      <!-- Cafeteria Selection -->
      <div class="col-12 col-md-3">
        <label for="cafeteria" class="labelText d-block">Cafeteria</label>
        <select
          [disabled]="!orgDetails"
          class="form-select"
          [(ngModel)]="filterObj.cafeId"
          (change)="clearList()"
        >
          <option selected disabled value="">Select Cafeteria</option>
          <option
            *ngFor="let option of orgDetails?.cafeteriaList"
            [value]="option._id"
          >
            {{ option.cafeteria_name }}
          </option>
        </select>
      </div>
      <div class="col-12 col-md-3">
        <label for="fromDate" class="labelText d-block">From Date</label>
        <input
          type="date"
          [(ngModel)]="filterObj.fromDate"
          class="form-control"
          (change)="getReportHistoryByfilter()"
        />
      </div>

      <!-- To Date -->
      <div class="col-12 col-md-3">
        <label for="toDate" class="labelText d-block">To Date</label>
        <input
          type="date"
          [(ngModel)]="filterObj.toDate"
          class="form-control"
          (change)="getReportHistoryByfilter()"
        />
      </div>

      <div class="col-12 col-md-3">
        <label for="exampleFormControlInput2" class="labelText d-block"
          >Search</label
        >

        <input
          type="text"
          (input)="searchFilter($event)"
          class="form-control"
          placeholder="Search"
          aria-label="Search Filter"
          aria-describedby="basic-addon2"
        />
      </div>
    </div>
  </div>

  <div>
    <div class="container mt-2" *ngIf="filteredReportHistory.length > 0">
      <div
        class="row customCard list-group mb-2"
        *ngFor="let Report of filteredReportHistory; let i = index"
      >
        <div class="list-group-item">
          <div class="row">
            <div
              style="cursor: pointer"
              class="bgTopDownpadding1 d-flex align-items-center justify-content-between p-2"
              (click)="toggleFeedback(i)"
            >
              <div class="d-flex align-items-center gap-4 flex-wrap">
                <div class="d-flex align-items-center">
                  <div class="labelText">Submited User :</div>
                  <div class="labelData">{{ Report.SubmitedBy }}</div>
                </div>
                <div class="d-flex align-items-center">
                  <div class="labelText">Submited Date :</div>
                  <div class="labelData">
                    {{ Report.SubmitedDate | date : "dd/MM/yyyy" }}
                  </div>
                </div>
              </div>
              <span class="right">
                <i class="bi bi-chevron-down" *ngIf="!expandedItems[i]"></i>
                <i class="bi bi-chevron-up" *ngIf="expandedItems[i]"></i>
              </span>
            </div>
            <ng-container *ngIf="expandedItems[i]">
              <ng-container
                *ngFor="let item of Report.checklist_questions; index as k"
              >
                <div class="cardDesignfeddback">
                  <div class="d-flex flex-row items-center gap-4">
                    <div>
                      <div class="labelText">Question</div>
                      <div class="labelData">{{ item.checklistQuestion }}</div>
                    </div>
                    <div>
                      <div class="labelText">Selected</div>
                      <div class="labelData">{{ item.selected }}</div>
                    </div>
                    <div *ngIf="item.comment != ''">
                      <div class="labelText">Comment</div>
                      <div class="labelData">{{ item.comment }}</div>
                    </div>
                  </div>
                </div>
              </ng-container>
            </ng-container>
          </div>
        </div>
      </div>
      <button
        type="button"
        *ngIf="nextOn"
        class="btn btn-primary btn-sm mt-2"
        (click)="getMore()"
      >
        Load More
      </button>
    </div>
    <div
      class="center labelText mt-2"
      *ngIf="filteredReportHistory.length == 0"
    >
      No History found
    </div>
  </div>
</div>
