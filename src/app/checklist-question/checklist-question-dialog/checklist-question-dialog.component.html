<h2 mat-dialog-title>{{ title }}</h2>

<mat-dialog-content >
  <form [formGroup]="form" class="dialog-form" class="pt-4">
    <mat-form-field appearance="outline" class="w-100 mb-3">
      <mat-label>Checklist Type</mat-label>
      <mat-select formControlName="checklistQuestionType">
        <mat-option
          *ngFor="let type of data.checklistTypes"
          [value]="type"
        >
          {{ type }}
        </mat-option>
      </mat-select>
      <mat-error *ngIf="checklistQuestionTypeCtrl?.hasError('required')">
        Type is required.
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="w-100">
      <mat-label>Question</mat-label>
      <textarea
        matInput
        rows="3"
        formControlName="checklistQuestion"
        placeholder="Enter checklist question"
      ></textarea>
      <mat-error *ngIf="checklistQuestionCtrl?.hasError('required')">
        Question is required.
      </mat-error>
      <mat-error *ngIf="checklistQuestionCtrl?.hasError('minlength')">
        Question should be at least 5 characters.
      </mat-error>
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Cancel</button>
  <button mat-raised-button color="primary" (click)="onSubmit()">
    {{ actionLabel }}
  </button>
</mat-dialog-actions>
