<div class="filter-dialog">
    <!-- Header -->
    <div class="dialog-header">
        <div class="header-left">
            <mat-icon class="header-icon">filter_list</mat-icon>
            <div>
                <h2 class="dialog-title">Filter Dashboard</h2>
                <span class="active-badge" *ngIf="activeCount > 0">{{ activeCount }} active</span>
            </div>
        </div>
        <button mat-icon-button class="close-btn" (click)="cancel()">
            <mat-icon>close</mat-icon>
        </button>
    </div>

    <!-- Body -->
    <div class="dialog-body">

        <!-- Organization -->
        <mat-form-field appearance="outline" class="w-100 mb-2">
            <mat-label>Organization</mat-label>
            <mat-select [(value)]="selectedOrg" (selectionChange)="onOrgChange()">
                <mat-option value="">All Organizations</mat-option>
                <mat-option *ngFor="let org of data.orgList" [value]="org.organization_name">
                    {{ org.organization_name }}
                </mat-option>
            </mat-select>
        </mat-form-field>

        <!-- City / Location (Combined) -->
        <!-- <mat-form-field appearance="outline" class="w-100 mb-4" [class.disabled]="filteredCityLocations.length === 0">
            <mat-label>City / Location</mat-label>
            <mat-select [(value)]="selectedCityLocation" (selectionChange)="onCityLocationChange()"
                [disabled]="filteredCityLocations.length === 0">
                <mat-option value="">All</mat-option>
                <mat-option *ngFor="let opt of filteredCityLocations" [value]="opt.value">
                    {{ opt.label }}
                </mat-option>
            </mat-select>
        </mat-form-field> -->

        <!-- Order Status -->
        <div class="filter-group">
            <label class="filter-label">
                <mat-icon>receipt_long</mat-icon> Order Status
            </label>
            <div class="chip-selector">
                <div class="chip-option" [class.active]="selectedStatus ===''" (click)="selectedStatus =''">
                    All
                </div>
                <div class="chip-option" *ngFor="let s of data.uniqueOrderStatuses"
                    [class.active]="selectedStatus === s" (click)="selectedStatus = s">
                    {{ orderStatusMapper[s] || s }}
                </div>
            </div>
        </div>

    </div>

    <!-- Footer -->
    <div class="dialog-footer">
        <button mat-stroked-button class="btn-clear" (click)="clearAll()" *ngIf="activeCount > 0">
            <mat-icon>filter_alt_off</mat-icon> Clear All
        </button>
        <div class="footer-right">
            <button mat-stroked-button class="btn-cancel" (click)="cancel()">Cancel</button>
            <button mat-flat-button class="btn-apply" (click)="apply()">
                <mat-icon>check</mat-icon> Apply Filters
                <span class="apply-count" *ngIf="activeCount > 0">({{ activeCount }})</span>
            </button>
        </div>
    </div>
</div>
