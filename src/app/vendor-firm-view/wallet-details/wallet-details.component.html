<div class="container-fluid mt-3 pb-4">

    <!-- Balance cards row -->
    <div class="row g-3 mb-4">
        <!-- Wallet card -->
        <div class="col-12 col-md-4">
            <div class="card text-center shadow-sm h-100">
                <div class="card-body d-flex flex-column justify-content-between">
                    <div>
                        <h5 class="card-title mb-1">Wallet Balance</h5>
                        <h2 class="fw-bold text-success" *ngIf="walletBalance > 0; else zeroWallet">
                            {{ walletBalance | currency:'INR':'symbol':'1.2-4':'en-IN' }}
                        </h2>
                        <ng-template #zeroWallet>
                            <h2 class="fw-bold text-muted">₹0.00</h2>
                        </ng-template>
                    </div>

                    <div class="btnDiv pt-3 d-flex gap-2 justify-content-center flex-wrap">
                        <button class="btn-import" mat-flat-button (click)="openTxnDialog('Transfer', 'wallet')"
                            aria-label="Transfer Wallet Balance">
                            <mat-icon>swap_horiz</mat-icon> Transfer Wallet Balance
                        </button>

                        <button class="btn-credit" mat-flat-button (click)="openTxnDialog('Credit')"
                            aria-label="Credit Wallet">
                            <mat-icon>add</mat-icon> Credit Wallet Balance
                        </button>

                        <button class="btn-debit" mat-stroked-button [disabled]="!walletBalance || walletBalance <= 0"
                            (click)="openTxnDialog('Debit')" aria-label="Debit amount (disabled when wallet is zero)">
                            <mat-icon>remove_circle</mat-icon> Debit Wallet Balance
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Subsidy card -->
        <div class="col-12 col-md-4">
            <div class="card shadow-sm h-100">
                <div class="card-body d-flex flex-column justify-content-between">
                    <div>
                        <div class="d-flex align-items-center justify-content-between mb-1">
                            <h5 class="card-title mb-0">Subsidy Balance</h5>
                            <button mat-icon-button matTooltip="Subsidy gets credited monthly."
                                aria-label="About subsidy credit frequency" type="button">
                                <mat-icon aria-hidden="true">info</mat-icon>
                            </button>
                        </div>

                        <h4 class="fw-bold text-success" *ngIf="subsidyBalance > 0; else noSubsidy">
                            {{ subsidyBalance | currency:'INR':'symbol':'1.2-2':'en-IN' }}
                        </h4>
                        <ng-template #noSubsidy>
                            <h2 class="fw-bold text-muted mt-1">No Balance</h2>
                        </ng-template>
                    </div>

                    <div class="pt-3 d-flex justify-content-start">
                        <button class="btn-import" mat-flat-button *ngIf="subsidyBalance > 0"
                            [disabled]="!subsidyBalance || subsidyBalance <= 0"
                            (click)="openTxnDialog('Transfer', 'subsidy')" aria-label="Transfer subsidy to wallet">
                            <mat-icon>swap_horiz</mat-icon> Transfer Subsidy To Wallet Balance
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Daily card -->
        <div class="col-12 col-md-4">
            <div class="card shadow-sm h-100">
                <div class="card-body d-flex flex-column justify-content-between">
                    <div>
                        <div class="d-flex align-items-center justify-content-between mb-1">
                            <h5 class="card-title mb-0">Daily Balance</h5>
                            <button mat-icon-button matTooltip="Daily balance gets credited monthly."
                                aria-label="About daily credit frequency" type="button">
                                <mat-icon aria-hidden="true">info</mat-icon>
                            </button>
                        </div>

                        <h4 class="fw-bold text-success" *ngIf="dailyBalance > 0; else noDaily">
                            {{ dailyBalance | currency:'INR':'symbol':'1.2-2':'en-IN' }}
                        </h4>
                        <ng-template #noDaily>
                            <h2 class="fw-bold text-muted mt-1">No Balance</h2>
                        </ng-template>
                    </div>

                    <div class="pt-3 d-flex justify-content-start">
                        <button class="btn-import" mat-flat-button *ngIf="dailyBalance > 0"
                            [disabled]="!dailyBalance || dailyBalance <= 0" (click)="openTxnDialog('Transfer', 'daily')"
                            aria-label="Transfer daily balance to wallet">
                            <mat-icon>swap_horiz</mat-icon> Transfer Daily Balance To Wallet Balance
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Reusable Transaction History Component -->
    <app-wallet-transaction-history [vendorFirmInfo]="vendorFirmInfo"></app-wallet-transaction-history>

</div>
