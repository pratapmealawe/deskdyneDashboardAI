<button mat-flat-button (click)="goBack()">
  <mat-icon>arrow_back</mat-icon>
  Back
</button>
<mat-tab-group [(selectedIndex)]="selectedTabIndex" (selectedTabChange)="onTabChange($event)" class="custom-tabs p-3" >
  <mat-tab *ngFor="let view of vendorViewList" class="custom-tabs">
    <ng-template mat-tab-label class="custom-tabs">
      {{ view.name }}
    </ng-template>
    <ng-container *ngIf="selectedTab === view.path">
      <mat-tab-group [(selectedIndex)]="selectedSubTabIndex" (selectedTabChange)="onTabSubChange($event)" class="mt-3"
        [ngClass]="{ 'wallet-border': selectedTab === 'wallet' }">
        <mat-tab *ngFor="let sub of getSubTab() ; let i = index" class="second-tab" >
          <ng-template mat-tab-label>
            {{ sub.name }}
          </ng-template>
        </mat-tab>
      </mat-tab-group>
    </ng-container>
  </mat-tab>
</mat-tab-group>
<ng-container [ngSwitch]="selectedTab">
  <app-vendor-details *ngSwitchCase="'vendorFirmDetails'" [vendorObj]="vendor"></app-vendor-details>
</ng-container>
<ng-container [ngSwitch]="selectedSubTab">
  <app-wallet-details *ngSwitchCase="'walletDetails'" [vendorFirmInfo]="vendorFirmInfo"></app-wallet-details>
  <app-ledger-details *ngSwitchCase="'ledgerDetails'" [vendorFirmInfo]="vendorFirmInfo"></app-ledger-details>
  <app-vendor-report *ngSwitchCase="'vendorFirmReport'" [vendorFirmInfo]="vendorFirmInfo"></app-vendor-report>
  <app-vendor-daily-report *ngSwitchCase="'vendorFirmDailyReport'" [vendorFirmInfo]="vendorFirmInfo"></app-vendor-daily-report>
</ng-container>
