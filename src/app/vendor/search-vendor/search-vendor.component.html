<div class="vendor-header">
  <div>
    <h4 class="m-0 fw-semibold">Vendor Management</h4>
  </div>
  <div class="header-actions">
    <div class="input-wrapper me-3">
      <mat-form-field appearance="outline" class="w-100 search-input">
        <input matInput type="text" placeholder="Seach Vendor Firm" [formControl]="searchControl" />
        <button mat-icon-button matSuffix>
          <mat-icon>search</mat-icon>
        </button>
      </mat-form-field>
    </div>
    <button class="btn-add" mat-flat-button (click)="addVendor()">
      <mat-icon>add_business</mat-icon>
      Add Vendor
    </button>
  </div>
</div>

<div class="container-fluid">
  <div *ngIf="vendorList && vendorList.length === 0; else vendorListTmp" class="center text-muted mt-5">
    No Vendor Found
  </div>

  <ng-template #vendorListTmp>
    <div class="mb-5">
      <app-vendor-card [vendorFirm]="filterVendorDuplicate" (deleted)="getAllVendors()"></app-vendor-card>
    </div>
  </ng-template>
</div>
