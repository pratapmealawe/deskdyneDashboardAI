<div class="dialog-header p-3 border-bottom d-flex justify-content-between align-items-center">
  <h4 class="dialog-title m-0">Select Popup</h4>
  <button mat-icon-button (click)="close()">
    <mat-icon>close</mat-icon>
  </button>
</div>
<div class="dialog-content p-3">
  <div *ngIf="popups.length; else noPopups">
    <div *ngFor="let popup of popups" class="list-item-modal" (click)="toggleCheckbox(popup)"
      [class.selected]="popup.isChecked">
      <div class="d-flex align-items-center gap-3">
        <mat-checkbox [(ngModel)]="popup.isChecked" color="primary" (click)="$event.stopPropagation()"></mat-checkbox>
        <div class="w-100">
          <div class="row align-items-center">
            <div class="col-md-4">
              <div class="labelText">Popup Name</div>
              <div class="labelData fw-bold">{{ popup.popupName }}</div>
            </div>
            <div class="col-md-4 text-center">
              <div class="labelText">Status</div>
              <div class="labelData">
                <span class="badge-pill" [class.open]="popup.popupType">
                  {{ popup.popupType ? 'Opened' : 'Closed' }}
                </span>
              </div>
            </div>
            <div class="col-md-4">
              <div class="labelText">Organization / Cafeteria</div>
              <div class="labelData text-truncate small">
                {{ popup.organizationDetails?.organization_name || '-' }} /
                {{ popup.cafeteriaDetails?.cafeteria_name || '-' }}
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="d-flex justify-content-end mt-3">
      <button mat-flat-button color="primary" [disabled]="!isAnySelected()" (click)="confirmSelection()">
        AddSelected
      </button>
    </div>
  </div>
  <ng-template #noPopups>
    <div class="text-center p-4 text-secondary">No popups available for this vendor firm.</div>
  </ng-template>
</div>
