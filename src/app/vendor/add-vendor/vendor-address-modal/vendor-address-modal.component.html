<div class="dialog-header p-3 border-bottom d-flex justify-content-between align-items-center">
  <h4 class="dialog-title m-0">Select Address</h4>
  <button mat-icon-button (click)="close()">
    <mat-icon>close</mat-icon>
  </button>
</div>
<div class="dialog-content p-3">
  <div class="mt-3" *ngIf="addressList.length; else noAddress">
    <mat-radio-group [(ngModel)]="selectedAddress">
      <div *ngFor="let address of addressList" class="list-item-modal"
        [ngClass]="{'selected': selectedAddress === address}" (click)="selectAddress(address)">

        <div class="d-flex align-items-start gap-3">
          <mat-radio-button [value]="address" color="primary" (click)="$event.stopPropagation()">
          </mat-radio-button>

          <div class="w-100">
            <div class="row align-items-center">
              <div class="col-md-6 mb-1 mb-md-0">
                <div class="labelText">Address</div>
                <div class="labelData fw-bold text-truncate" [title]="address.address1">{{ address.address1 }}</div>
              </div>
              <div class="col-md-3 mb-1 mb-md-0">
                <div class="labelText">Location</div>
                <div class="labelData text-truncate" [title]="address.location">{{ address.location }}</div>
              </div>
              <div class="col-md-3">
                <div class="labelText">Landmark</div>
                <div class="labelData text-truncate" [title]="address.landmark">{{ address.landmark ||'-' }}</div>
              </div>
            </div>
          </div>
        </div>

      </div>
    </mat-radio-group>
    <div class="d-flex justify-content-end mt-3">
      <button mat-flat-button color="primary" (click)="confirmSelection()" [disabled]="!selectedAddress">
        <mat-icon>add</mat-icon> Add Selected
      </button>
    </div>
  </div>
  <ng-template #noAddress>
    <div class="alert alert-info">No addresses available for this vendor firm.</div>
  </ng-template>
</div>
