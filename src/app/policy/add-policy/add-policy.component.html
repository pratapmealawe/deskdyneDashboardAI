<div class="admin-header">
  <div>
    <h4 class="m-0 fw-semibold">
      {{ editMode ? "Update Policy" : "Add Policy" }}
    </h4>
  </div>
</div>

<div class="container-fluid policy-container">

  <!-- POLICY DETAILS -->
  <mat-card class="mb-3">
    <div class="row g-3">
      <div class="col-md-4 col-sm-12">
        <div class="field-label">Policy Name <span class="text-danger">*</span></div>
        <mat-form-field appearance="outline" class="w-100 input">
          <input matInput [(ngModel)]="policyObj.policy_name" required placeholder="Policy Name" />
          <mat-error *ngIf="showErrorMsg && !policyObj.policy_name">
            Policy name is required.
          </mat-error>
        </mat-form-field>
      </div>

      <div class="col-md-4 col-sm-12" *ngIf="policyArr.length > 0">
        <div class="field-label">Reference Policy</div>
        <mat-form-field appearance="outline" class="w-100 input">
          <mat-select (selectionChange)="showReferencePolicy($event)">
            <mat-option disabled selected value="">
              -- Select Policy --
            </mat-option>
            <mat-option *ngFor="let item of policyArr" [value]="item._id">
              {{ item.policy_name }}
            </mat-option>
          </mat-select>
        </mat-form-field>
      </div>

      <div class="col-md-4 col-sm-12">
        <div class="field-label">Policy Description <span class="text-danger">*</span></div>
        <mat-form-field appearance="outline" class="w-100 input">
          <input matInput [(ngModel)]="policyObj.policy_description" required placeholder="Policy Description" />
          <mat-error *ngIf="showErrorMsg && !policyObj.policy_description">
            Description is required.
          </mat-error>
        </mat-form-field>
      </div>
    </div>
  </mat-card>

  <!-- ROUTE ACCESS -->
  <mat-card class="mb-3">
    <div class="section-header">
      <h5 class="section-title">Route Access</h5>

      <button mat-button color="primary" class="select-btn" (click)="selectAllRoutes()">
        Select All
      </button>
    </div>

    <mat-chip-listbox class="chip-list" multiple>
      <mat-chip-option *ngFor="let item of routeKeys" [selected]="policyObj.route_policies[item]"
        (click)="policyObj.route_policies[item] = !policyObj.route_policies[item]">
        {{ item }}
      </mat-chip-option>
    </mat-chip-listbox>
  </mat-card>

  <!-- BUTTON ACCESS -->
  <mat-card class="mb-3">
    <div class="section-header">
      <h5 class="section-title">Button Access</h5>

      <button mat-button color="primary" class="select-btn" (click)="selectAllButtons()">
        Select All
      </button>
    </div>

    <mat-chip-listbox class="chip-list" multiple>
      <mat-chip-option *ngFor="let item of buttonKeys" [selected]="policyObj.button_policies[item]"
        (click)="policyObj.button_policies[item] = !policyObj.button_policies[item]">
        {{ item }}
      </mat-chip-option>
    </mat-chip-listbox>
  </mat-card>

  <!-- ACTION BUTTONS -->
  <div class="action-buttons">
    <button class="btn-add" mat-raised-button *ngIf="!editMode" (click)="addPolicy()">
      <mat-icon>add</mat-icon>
      Save
    </button>

    <button class="btn-update" mat-raised-button *ngIf="editMode" (click)="updatePolicy()">
      <mat-icon>system_update_alt</mat-icon>
      Update
    </button>

    <button mat-stroked-button color="primary" (click)="cancelPolicy()">
      <mat-icon>cancel</mat-icon>
      Cancel
    </button>
  </div>

  <div class="error-msg" *ngIf="showErrorMsg">
    Please enter Policy Name and Description.
  </div>
</div>
