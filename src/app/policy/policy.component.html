<div class="policy-listing-board">
    <!-- Premium Header -->
    <div class="premium-header mb-4">
        <div class="header-left">
            <div class="icon-box primary">
                <mat-icon>security</mat-icon>
            </div>
            <div class="title-wrap">
                <h2 class="page-title">Policy & Permissions</h2>
                <p class="page-subtitle">Manage role-based access control and system permissions</p>
            </div>
        </div>

        <div class="header-actions">
            <!-- Search field -->
            <div class="search-box-wrap">
                <mat-form-field appearance="outline" subscriptSizing="dynamic">
                    <mat-icon matPrefix>search</mat-icon>
                    <input matInput [formControl]="searchControl" placeholder="Search policies...">
                </mat-form-field>
            </div>

            <button mat-flat-button color="primary" class="btn-add-policy" (click)="addPolicy()" *appHasPermission="'POLICY:ADD'">
                <mat-icon>add</mat-icon>
                <span>Add New Policy</span>
            </button>
        </div>
    </div>

    <!-- Policy Cards Grid -->
    <div class="policy-grid" *ngIf="filteredPolicyArr.length > 0; else emptyState">
        <div class="policy-card-modern" *ngFor="let policy of filteredPolicyArr">
            <div class="card-content">
                <div class="policy-branding">
                    <div class="icon-circle">
                        <mat-icon>admin_panel_settings</mat-icon>
                    </div>
                </div>
                
                <div class="policy-info">
                    <h3 class="policy-name">{{ policy.policy_name }}</h3>
                    <p class="policy-desc">{{ policy.policy_description }}</p>
                </div>

                <div class="card-actions">
                    <button mat-icon-button class="btn-edit" (click)="editPolicy(policy._id)" 
                            matTooltip="Edit Permissions" *appHasPermission="'POLICY:EDIT'">
                        <mat-icon>edit</mat-icon>
                    </button>
                    <button mat-icon-button class="btn-delete" (click)="confirmDelete(policy._id)" 
                            matTooltip="Delete Policy" *appHasPermission="'POLICY:DELETE'">
                        <mat-icon>delete_outline</mat-icon>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Empty State -->
    <ng-template #emptyState>
        <div class="empty-media-card p-5 center">
            <div class="media-wrap mb-3">
                <mat-icon class="huge-icon text-soft">policy</mat-icon>
            </div>
            <h3 class="text-secondary fw-bold">No Policies Found</h3>
            <p class="text-muted">Create a new policy to start managing system access.</p>
            <button mat-button color="primary" class="mt-2" (click)="addPolicy()" *appHasPermission="'POLICY:ADD'">
                <mat-icon>add</mat-icon> Create First Policy
            </button>
        </div>
    </ng-template>
</div>
