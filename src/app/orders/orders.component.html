<div class="bgpadding2">
    

    <div class="row mb-4 mt-2 p-3 bg-light rounded filterDiv">
        <div class="mb-2">
        <i class="bi bi-bootstrap-reboot pointer right" (click)="reloadPage()"></i>
    </div>
        <div class="col-md-3">
            <label class="labelText">Organization</label>
            <select class="form-select" [(ngModel)]="filterObj.orgId" (change)="setOrgDetails()">
                <option selected disabled value="">Select Organization</option>
                <option *ngFor="let option of orglist" [value]="option._id">
                    {{ option.organization_name }}
                </option>
            </select>
        </div>

        <div class="col-md-3">
            <label class="labelText">Cafeteria</label>
            <select class="form-select" [(ngModel)]="filterObj.cafeId">
                <option selected disabled value="">Select Cafeteria</option>
                <option *ngFor="let option of cafeList" [value]="option.cafeteria_id">
                    {{ option.cafeteria_name }}
                </option>
            </select>
        </div>

        <div class="col-md-3 btnDiv">
            <button class="btn btn-primary" [disabled]="!filterObj.orgId || !filterObj.cafeId"
                (click)="reloadPage()">Submit</button>
        </div>
    </div>

    <div class="main-div" *ngIf="filteredList.length>0">
        <div class="cl6" [ngClass]="{tileSelected: selectedStatus === 'paymentInprogress'}"
            (click)="getLatestOrderStatusList('paymentInprogress')">
            <span class="tileLabel header4 countTile">Payment In progress<span
                    class="tileBadge">{{orderStatusCountObj.paymentInprogress}}</span></span>
        </div>
        <div class="cl6" [ngClass]="{tileSelected: selectedStatus === 'paymentFailed'}"
            (click)="getLatestOrderStatusList('paymentFailed')">
            <span class="tileLabel header4 countTile">Payment Failed<span
                    class="tileBadge">{{orderStatusCountObj.paymentFailed}}</span></span>
        </div>
        <div class="cl6" [ngClass]="{tileSelected: selectedStatus === 'placed'}"
            (click)="getLatestOrderStatusList('placed')">
            <span class="tileLabel header4 countTile">Placed<span
                    class="tileBadge">{{orderStatusCountObj.placed}}</span></span>
        </div>

        <div class="cl6" [ngClass]="{tileSelected: selectedStatus === 'completed'}"
            (click)="getLatestOrderStatusList('completed')">
            <span class="tileLabel header4 countTile">Completed<span
                    class="tileBadge">{{orderStatusCountObj.completed}}</span></span>
        </div>
        <div class="bgpadding2">
            <div *ngIf="filteredList.length > 0">
                <div class="navigationBtns">
                    <button class="btn btn-dark btn-sm me-4" (click)="previous(page)"
                        [disabled]="page === 1">Previous</button>
                    <span class="labelText">Showing {{pageFirstEntry}} to {{pageLastEntry}}</span>
                    <button class="btn btn-dark btn-sm ms-4" (click)="next(page)"
                        [disabled]="paginationOver && page === lastPage">Next</button>
                </div>
                <div *ngIf="filteredList.length > 0" class="mt-3">
                    <ul *ngFor="let order of filteredList" class="list-group">
                        <li class="list-group-item">
                            <app-order-card [order]="order"></app-order-card>
                        </li>
                    </ul>
                </div>
            </div>

        </div>
    </div>

    <div class="center" *ngIf="filteredList.length === 0">
        No Records Found
    </div>
</div>
