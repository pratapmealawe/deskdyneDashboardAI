<div *ngIf="showDialog" class="dialog-wrapper" role="dialog" aria-modal="true">
  <div class="dialog-content">
    <div class="dialogHeader" [class.danger]="modalObj.data?.isDanger">
      <div class="header-title">
        <mat-icon class="status-icon" *ngIf="!modalObj.data?.isDanger">help_outline</mat-icon>
        <mat-icon class="status-icon danger" *ngIf="modalObj.data?.isDanger">warning_amber</mat-icon>
        <span>{{ modalObj.data?.title || 'Confirmation' }}</span>
      </div>
      <button class="close-header-btn" (click)="cancel()">
        <mat-icon>close</mat-icon>
      </button>
    </div>

    <div class="dialogbody">
      <p class="modal-message">{{ modalObj.msg }}</p>
    </div>

    <div class="dialogfooter">
      <button mat-button class="modal-btn cancel-btn" (click)="cancel()" *ngIf="!modalObj.data?.onlyConfirm">
        {{ modalObj.data?.cancelText || 'Cancel' }}
      </button>
      <button mat-flat-button class="modal-btn confirm-btn" [class.danger-btn]="modalObj.data?.isDanger" (click)="confirm()">
        {{ modalObj.data?.confirmText || 'Confirm' }}
      </button>
    </div>
  </div>
</div>
