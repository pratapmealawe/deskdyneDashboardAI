<h2 mat-dialog-title>Crop Image</h2>
<mat-dialog-content class="mat-typography">
    <div class="image-container">
        <img [src]="uploadedImageUrl" alt="" id="cropper">
    </div>
</mat-dialog-content>
<mat-dialog-actions align="end">
    <button mat-button color="warn" (click)="goback(false)">Close</button>
    <button mat-raised-button color="primary" (click)="done()">Ok</button>
</mat-dialog-actions>
