<div class="vendor-header" *ngIf="!isViewCustomer">
    <div>
        <h4 class="m-0 fw-semibold">Users</h4>
    </div>
    <div class="header-actions">
        <div class="input-wrapper">
            <mat-form-field appearance="outline" class="w-100 search-input">
                <input matInput type="text" matInput (input)="searchFilter($event)" (input)="searchFilter($event)"
                    [value]="searchText" placeholder="Search by name, phone, or email" />
                <button mat-icon-button matSuffix aria-label="Search" class="search-icon">
                    <mat-icon>search</mat-icon>
                </button>
            </mat-form-field>
        </div>
    </div>
</div>

<div class="container-fluid pb-4" *ngIf="!isViewCustomer">
    <div class="row g-3 align-items-end mb-3">
        <!-- Organization Selection -->
        <div class="col-12 col-md-6">
            <mat-form-field appearance="outline" class="select-field">
                <mat-label>Organization</mat-label>
                <mat-select [(ngModel)]="filterObj.orgId" [disabled]="orgAdmin?.role === 'ORGADMIN' || isDisabled"
                    (selectionChange)="submitFilter()">
                    <mat-option [value]="''" disabled>Select Organization</mat-option>
                    <mat-option *ngFor="let option of orglist" [value]="option._id">
                        {{ option.organization_name }}
                    </mat-option>
                </mat-select>
            </mat-form-field>
        </div>

        <!-- Search -->
        <div class="col-12 col-md-6 text-md-end">
            <!-- Export buttons -->
            <div class="d-flex justify-content-end mb-2 gap-2">
                <button class="btn-import" mat-stroked-button *ngIf=" filteredCustomerList?.length && !isOrgAdmin"
                    (click)="openBulkWalletDialog()">
                    <mat-icon>upload_file</mat-icon> Bulk Wallet Add
                </button>
                <button class="btn-export-excel" mat-stroked-button *ngIf="filteredCustomerList?.length"
                    (click)="exportToExcel()">
                    <mat-icon>file_download</mat-icon> Export Excel
                </button>

                <button class="btn-export-pdf" mat-stroked-button *ngIf="filteredCustomerList?.length"
                    (click)="exportToPdf()">
                    <mat-icon>picture_as_pdf</mat-icon> Export PDF
                </button>
            </div>
        </div>
    </div>

    <!-- List -->
    <ng-container *ngIf="filteredCustomerList?.length; else noUsers">
        <div class="row g-3">
            <div class="col-12" *ngFor="let user of pagedCustomerList">
                <mat-card class="user-card">
                    <div class="row align-items-center">
                        <div class="col-12 col-md-3 mb-2 mb-md-0">
                            <div class="labelText">Name</div>
                            <div class="labelData fw-semibold">
                                {{ user?.userName || '-' }}
                            </div>
                        </div>

                        <div class="col-12 col-md-2 mb-2 mb-md-0">
                            <div class="labelText">Phone No</div>
                            <div class="labelData">
                                {{ user?.phoneNo || '-' }}
                            </div>
                        </div>

                        <div class="col-12 col-md-3 mb-2 mb-md-0">
                            <div class="labelText">Email</div>
                            <div class="labelData text-truncate">
                                {{ user?.email || '-' }}
                            </div>
                        </div>

                        <div class="col-12 col-md-3 mb-2 mb-md-0">
                            <div class="labelText">Employee Info</div>
                            <div class="labelData text-truncate">
                                {{ user?.employeeInfo?.org_name || '-' }} |
                                {{ user?.employeeInfo?.empId || '-' }}
                            </div>
                        </div>

                        <div *ngIf="!isOrgAdmin" class="col-12 col-md-1 text-md-end mt-2 mt-md-0">
                            <mat-icon color="primary" (click)="viewCustomer(user)" class="action-icon view"
                                matTooltip="View details">visibility</mat-icon>
                        </div>
                    </div>
                </mat-card>
            </div>
        </div>

        <!-- Pagination -->
        <div class="mt-3 d-flex justify-content-end">
            <mat-paginator [length]="filteredCustomerList.length" [pageSize]="pageSize" [pageIndex]="pageIndex"
                [pageSizeOptions]="[5, 10, 20, 50]" (page)="onPageChange($event)" showFirstLastButtons>
            </mat-paginator>
        </div>
    </ng-container>

    <!-- No users -->
    <ng-template #noUsers>
        <mat-card class="center labelText py-2 rounded-4 mt-4">
            No users found
        </mat-card>
    </ng-template>
</div>

<!-- Detail view -->
<ng-container *ngIf="isViewCustomer">
    <app-customer-view [userDetails]="selectedUser" (backBtnEmitter)="backBtnPress()"></app-customer-view>
</ng-container>
