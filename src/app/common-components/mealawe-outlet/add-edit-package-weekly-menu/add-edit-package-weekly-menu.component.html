<h2 mat-dialog-title>Manage Weekly Menu</h2>
<mat-dialog-content class="p-3">
    <div *ngIf="selectedSource === '' && !weekMenuList.length">
        <div class="row g-3">
            <div class="col-12 col-md-3" *ngFor="let source of menuSources">
                <button mat-raised-button [color]="source.color" class="w-100 py-2" (click)="source.action(data)">
                    {{ source.label }}
                </button>
            </div>
        </div>
    </div>
    <div *ngIf="selectedSource" class="mt-5">
        <h6>Select Source of Weekly Menu</h6>
        <div *ngIf="selectedSource === 'mealawe'" class="mt-2">
            <mat-form-field appearance="outline" style="min-width: 100px;">
                <mat-label>Select Cluster</mat-label>
                <mat-select [(ngModel)]="data.selectedClusterId" (selectionChange)="onClusterChange(data)" required>
                    <mat-option *ngFor="let cluster of availableClusters" [value]="cluster.clusterId">
                        {{ cluster.clusterName | uppercase }}
                    </mat-option>
                </mat-select>
                <mat-error *ngIf="!data.selectedClusterId">
                    Cluster selection is required
                </mat-error>
            </mat-form-field>
        </div>
    </div>
    <div *ngIf="weekMenuList.length">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h6 class="mb-0">Weekly Menu Details</h6>
            <button mat-stroked-button color="primary" (click)="addNewWeek()">
                + Add Week
            </button>
        </div>
        <mat-tab-group [selectedIndex]="activeWeekIndex">
            <mat-tab *ngFor="let week of weekMenuList; let i = index" [label]="'Week ' + week.weekNumber">
                <div class="px-3 pt-3 d-flex align-items-center gap-3">
                    <mat-checkbox [(ngModel)]="week.isSelected" (change)="selectWeek(i)">
                        Set as Active Week
                    </mat-checkbox>
                    <span class="badge bg-success" *ngIf="week.isSelected">Active Week</span>
                    <mat-error *ngIf="showRequiredError && !week.isSelected">
                        Please select an active week
                    </mat-error>
                </div>
                <mat-tab-group>
                    <mat-tab *ngFor="let type of ['veg', 'nonveg']" [label]="type | titlecase">
                        <div class="p-3">
                            <div *ngFor="let item of (type === 'veg' ? week.vegMenuList : week.nonvegMenuList)"
                                class="border rounded p-3 mb-3">
                                <div class="row g-3">
                                    <div class="col-12 col-md-3">
                                        <mat-form-field appearance="outline" class="w-100">
                                            <mat-label>Day</mat-label>
                                            <input matInput [value]="item.day" disabled />
                                        </mat-form-field>
                                    </div>
                                    <div class="col-12 col-md-9">
                                        <mat-form-field appearance="outline" class="w-100">
                                            <mat-label>Description</mat-label>
                                            <input matInput [(ngModel)]="item.description" #desc="ngModel" required
                                                placeholder="Enter menu description" />
                                            <mat-error *ngIf="desc.invalid && (desc.touched || desc.dirty)">
                                                Description is required
                                            </mat-error>
                                        </mat-form-field>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </mat-tab>
                </mat-tab-group>
            </mat-tab>
        </mat-tab-group>
    </div>
</mat-dialog-content>
<mat-dialog-actions align="end">
    <button mat-raised-button color="primary" (click)="saveMenu()">
        Save
    </button>
    <button mat-stroked-button color="warn" mat-dialog-close>
        Cancel
    </button>
</mat-dialog-actions>
