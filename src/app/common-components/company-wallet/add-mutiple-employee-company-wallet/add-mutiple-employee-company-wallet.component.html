<div class="modal-header d-flex justify-content-between align-items-center p-3 border-bottom">
    <h2 mat-dialog-title class="m-0 fs-5 fw-bold">Import Employees</h2>
    <button mat-icon-button (click)="onCancel()" class="close-btn">
        <span class="material-icons">close</span>
    </button>
</div>

<mat-dialog-content class="mat-typography p-4">
    <div class="text-center">
        <div class="mb-4">
            <p class="text-muted mb-2">Upload an Excel or CSV file to add multiple employees at once.</p>
            <a href="javascript:void(0)" class="text-primary text-decoration-none fw-medium" (click)="downloadSample()">
                <mat-icon class="align-middle fs-6 me-1"
                    style="font-size: 16px; height: 16px; width: 16px;">download</mat-icon>
                Download Sample Template
            </a>
        </div>

        <div class="upload-area p-5 border rounded bg-light mb-3 position-relative"
            style="border-style: dashed !important; border-color: #dee2e6;">
            <input type="file" class="position-absolute top-0 start-0 w-100 h-100 opacity-0 cursor-pointer"
                (change)="onFileSelected($event)" accept=".csv, .xlsx, .xls">

            <div *ngIf="!selectedFile; else fileSelected">
                <mat-icon class="fs-1 text-secondary mb-3"
                    style="font-size: 48px; height: 48px; width: 48px;">cloud_upload</mat-icon>
                <h6 class="fw-bold mb-1">Drag & Drop or Click to Upload</h6>
                <small class="text-muted">Supported formats: .xlsx, .xls, .csv</small>
            </div>

            <ng-template #fileSelected>
                <mat-icon class="fs-1 text-success mb-3"
                    style="font-size: 48px; height: 48px; width: 58px;">description</mat-icon>
                <h6 class="fw-bold mb-1 text-break">{{selectedFile?.name}}</h6>
                <p class="text-muted small mb-0">{{(selectedFile?.size || 0) / 1024 | number:'1.0-2'}} KB</p>
                <button mat-button color="warn" class="mt-2" (click)="removeFile($event)">Remove File</button>
            </ng-template>
        </div>
    </div>
</mat-dialog-content>

<mat-dialog-actions align="end" class="p-3 border-top gap-2">
    <button mat-button (click)="onCancel()" class="text-secondary">Cancel</button>
    <button mat-raised-button color="primary" (click)="onUpload()" [disabled]="!selectedFile">
        Upload Employees
    </button>
</mat-dialog-actions>
