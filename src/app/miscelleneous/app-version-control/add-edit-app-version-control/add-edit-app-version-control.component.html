<h2 mat-dialog-title>
  {{ addnewVariable ?'Add New App Version' :'Update App Version' }}
</h2>

<mat-dialog-content class="mat-typography">
  <div class="row g-3">
    <div class="col-sm-12 col-md-6">
      <label class="labelData mb-2" for="variableName">Application Name</label>
      <input type="text" class="form-control" id="variableName" [(ngModel)]="variableObj.appName"
        placeholder="Enter application name" />
    </div>
    <div class="col-sm-12 col-md-4">
      <label class="labelData mb-2" for="variableValue">Version</label>
      <input class="form-control" type="text" id="variableValue" [(ngModel)]="variableObj.appVersion"
        placeholder="Enter version" />
    </div>
    <div class="col-sm-12 col-md-2 d-flex align-items-end pb-1">
      <mat-checkbox [(ngModel)]="variableObj.isForceUpdate">Forceful</mat-checkbox>
    </div>
    <div class="col-sm-12 col-md-12 mt-3">
      <label class="labelData mb-2" for="releaseNotes">Release Notes / Build Details</label>
      <textarea class="form-control" id="releaseNotes" [(ngModel)]="variableObj.releaseNotes"
        placeholder="Enter what's new in this build..." rows="4"></textarea>
    </div>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-stroked-button color="warn" (click)="cancel()">Cancel</button>
  
  <ng-container *appHasPermission="'APP_VERSION:ADD'">
    <button *ngIf="addnewVariable" mat-raised-button color="primary" (click)="submit()">
      Submit
    </button>
  </ng-container>

  <ng-container *appHasPermission="'APP_VERSION:EDIT'">
    <button *ngIf="!addnewVariable" mat-raised-button color="primary" (click)="update()">
      Update
    </button>
  </ng-container>
</mat-dialog-actions>
